<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>소리 탐험대</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
*{box-sizing:border-box;}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;}
body{font-family:'Jua',sans-serif;
  background:linear-gradient(135deg,#a8edea 0%,#fed6e3 45%,#fdeff9 100%);
  background-attachment:fixed;color:#3a3a5c;user-select:none;
  -webkit-tap-highlight-color:transparent;}
#viewport{position:fixed;inset:0;overflow:hidden;}
#stage{position:absolute;width:1280px;height:800px;transform-origin:top left;}
.t-title{font-size:60px;line-height:1.1;}
.t-huge{font-size:42px;line-height:1.2;}
.t-big{font-size:30px;line-height:1.25;}
.t-mid{font-size:24px;line-height:1.3;}
.t-sm{font-size:20px;line-height:1.35;}
.card{background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);
  border:4px solid #fff;border-radius:36px;box-shadow:0 14px 36px rgba(120,110,200,0.22);}
.btn{border-radius:999px;font-family:'Jua',sans-serif;cursor:pointer;
  border-bottom:7px solid rgba(0,0,0,0.18);transition:transform .08s, filter .15s;}
.btn:active{transform:translateY(4px);border-bottom-width:3px;}
.btn:hover{filter:brightness(1.05);}
.btn:disabled{opacity:0.45;cursor:not-allowed;}
.beat-cell{border-radius:22px;border:4px solid #c9c2f0;background:rgba(255,255,255,0.6);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .1s, background .1s, border-color .1s;}
.beat-cell.now{border-color:#7c6cf0;background:#ede9ff;transform:scale(1.06);}
.beat-cell.filled{border-color:transparent;}
.inst-card{border-radius:26px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;transition:transform .12s, box-shadow .12s;
  border:5px solid transparent;}
.inst-card.sel{box-shadow:0 10px 24px rgba(124,108,240,.4);border-color:#fff;}
input[type=range]{-webkit-appearance:none;background:transparent;width:240px;}
input[type=range]::-webkit-slider-runnable-track{height:14px;border-radius:20px;
  background:linear-gradient(90deg,#a5b4fc,#f9a8d4);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:38px;width:38px;
  border-radius:50%;background:#7c6cf0;margin-top:-12px;border:4px solid #fff;
  box-shadow:0 4px 12px rgba(124,108,240,.5);cursor:pointer;}
textarea,input[type=text]{font-family:'Jua',sans-serif;}
.confetti{position:fixed;width:12px;height:12px;border-radius:3px;z-index:9999;pointer-events:none;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1;}
  100%{transform:translateY(820px) rotate(720deg);opacity:0;}}
@keyframes pop{0%{transform:scale(0) rotate(-30deg);opacity:0;}
  60%{transform:scale(1.3) rotate(10deg);opacity:1;}
  100%{transform:scale(1) rotate(0);opacity:1;}}
.pop{animation:pop .5s ease-out;}
.float{animation:floaty 3s ease-in-out infinite;}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
@keyframes pulseRed{0%,100%{background:#fb7185;}50%{background:#ef4444;}}
.rec{animation:pulseRed 1s ease-in-out infinite;}
.char-on{color:#ec4899;text-shadow:0 2px 8px rgba(236,72,153,.35);}
.fade-in{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.modal-bg{position:absolute;inset:0;background:rgba(60,50,90,.45);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;z-index:500;}
.back-btn{position:absolute;top:24px;left:24px;}
</style>
</head>
<body>
<div id="viewport"><div id="stage"><div id="root"></div></div></div>

<script type="text/babel">
const {useState,useEffect,useRef} = React;

const GAS_URL = 'https://script.google.com/macros/s/AKfycbwE4cXnPyYcBOwsWcjlit2jJawm-mZ-jcrS-fR0-ovCXcWnw9rfq6yDNJ3OL0k99AY/exec';

const api = {
  request: async (action,data={})=>{
    if(!GAS_URL){
      if(action==='getStudents') return {ok:true,students:[{no:1,name:'홍길동 (테스트)'},{no:2,name:'김민준 (테스트)'}]};
      if(action==='saveRecording') return new Promise(r=>setTimeout(()=>r({ok:true,fileUrl:'http://mock'}),800));
      return {ok:true};
    }
    try{ const res = await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,...data})}); return await res.json(); }
    catch(e){ return {ok:false,error:e.message}; }
  },
  getStudents:()=>api.request('getStudents'),
  saveRecording:(d)=>api.request('saveRecording',d),
  saveData:(d)=>api.request('saveData',d),
};

const speakerRef = React.createRef(); speakerRef.current = false;
function pickKoreanVoice(){
  const vs = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  let v = vs.find(x=>x.lang==='ko-KR' && x.name.toLowerCase().includes('google') && !x.localService);
  if(!v) v = vs.find(x=>/ko-KR/.test(x.lang) && /wavenet|neural2?/i.test(x.name));
  if(!v) v = vs.find(x=>/ko-KR/.test(x.lang) && /wavenet|neural|premium|enhanced|natural/i.test(x.name));
  if(!v) v = vs.find(x=>x.lang==='ko-KR' && x.name.toLowerCase().includes('google'));
  if(!v) v = vs.find(x=>x.lang==='ko-KR');
  return v;
}
function speak(text,opts={}){
  if(!speakerRef.current || !window.speechSynthesis) return;
  const synth = window.speechSynthesis;
  if(synth.speaking) synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const v = pickKoreanVoice(); if(v) u.voice=v;
  u.lang='ko-KR'; u.rate=opts.rate||0.95; u.pitch=opts.pitch||1.0;
  if(opts.onboundary) u.onboundary=opts.onboundary;
  if(opts.onend) u.onend=opts.onend;
  synth.speak(u);
}
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=()=>{};

const fx = {synth:null,
  init(){ if(!this.synth) this.synth = new Tone.Synth({oscillator:{type:'triangle'}}).toDestination(); },
  yay(){ if(!speakerRef.current)return; this.init(); const n=Tone.now();
    ['C5','E5','G5','C6','E6'].forEach((nt,i)=>this.synth.triggerAttackRelease(nt,0.15,n+i*0.1));}
};

function confetti(){
  const colors=['#fbbf24','#f472b6','#34d399','#60a5fa','#a78bfa','#fb7185'];
  for(let i=0;i<46;i++){
    const d=document.createElement('div'); d.className='confetti';
    d.style.left=Math.random()*100+'vw';
    d.style.background=colors[Math.floor(Math.random()*colors.length)];
    d.style.animation=`fall ${1.6+Math.random()*1.4}s ease-in ${Math.random()*0.4}s forwards`;
    document.body.appendChild(d); setTimeout(()=>d.remove(),3600);
  }
}

const INSTRUMENTS = [
  {id:'drum',     name:'작은 북',     color:'#fb923c'},
  {id:'triangle', name:'트라이앵글',  color:'#fbbf24'},
  {id:'tambourine',name:'탬버린',     color:'#f472b6'},
  {id:'castanets',name:'캐스터네츠',  color:'#f87171'},
];
const CUSTOM_COLORS = {my1:'#a78bfa', my2:'#2dd4bf'};
const CUSTOM_DEFAULT_NAMES = {my1:'내 소리 1', my2:'내 소리 2'};

const SITUATIONS = [
  {id:'snail', emoji:'🐌', name:'달팽이가 기어가요', desc:'아주 천천히 움직여요', bpm:62, hint:'느릿느릿 천천히! 칸을 띄엄띄엄 채워볼까요?'},
  {id:'run',   emoji:'🏃', name:'운동장에서 친구가 뛰어요', desc:'다다다다 빠르게 달려요', bpm:132, hint:'다다다다! 빠르게 칸을 많이 채워볼까요?'},
  {id:'rest',  emoji:'🛝', name:'즐거운 쉬는 시간', desc:'신나고 즐거워요', bpm:104, hint:'신나는 느낌! 자유롭게 만들어볼까요?'},
];

const TEMPO_PRESETS = [
  {id:'slow', emoji:'🐌', label:'느리게', bpm:60},
  {id:'mid',  emoji:'🚶', label:'보통',   bpm:100},
  {id:'fast', emoji:'🏃', label:'빠르게', bpm:140},
];

const RULE_PATTERNS = [
  {id:'every1', label:'매 박마다', pattern:[1,1,1,1,1,1,1,1], desc:'쿵 쿵 쿵 쿵 쿵 쿵 쿵 쿵'},
  {id:'every2', label:'두 박마다 한 번', pattern:[1,0,1,0,1,0,1,0], desc:'쿵 - 쿵 - 쿵 - 쿵 -'},
  {id:'every4', label:'네 박마다 한 번', pattern:[1,0,0,0,1,0,0,0], desc:'쿵 - - - 쿵 - - -'},
];

const STAGE_INFO = {
  1:{title:'1단계 · 박 만들기', short:'작은 북을 빈 칸에 콕콕!',
     steps:['빈 칸을 한 번 누르면 작은 북이 들어가요.','같은 칸을 다시 누르면 작은 북이 빠져요.','다 만들었으면 아래 [연주 ▶] 를 눌러 들어봐요.']},
  2:{title:'2단계 · 악기 바꾸기', short:'박자는 그대로, 악기만 바꿔봐요.',
     steps:['위쪽에서 다른 악기를 한 번 눌러보세요.','모든 칸의 악기가 한 번에 바뀌어요.','[연주 ▶] 로 느낌이 어떻게 다른지 들어봐요.']},
  3:{title:'3단계 · 자유롭게 섞기', short:'여러 악기를 함께! 풍부한 소리를 만들어요.',
     steps:['악기를 고른 다음, 빈 칸을 눌러 넣어요.','줄마다 다른 악기를 넣으면 같이 울려요.','마음에 들면 [🎵 음악 녹음] 을 눌러요.']},
};

function InstIcon({type,size=60}){
  const s={width:size,height:size};
  if(type==='drum') return (
    <svg viewBox="0 0 100 100" style={s}>
      <line x1="22" y1="8" x2="40" y2="26" stroke="#f59e0b" strokeWidth="6" strokeLinecap="round"/>
      <line x1="78" y1="8" x2="60" y2="26" stroke="#f59e0b" strokeWidth="6" strokeLinecap="round"/>
      <ellipse cx="50" cy="34" rx="34" ry="11" fill="#fff7ed" stroke="#9a3412" strokeWidth="3"/>
      <path d="M16 34 V62 Q16 73 50 73 Q84 73 84 62 V34" fill="#ea580c" stroke="#9a3412" strokeWidth="3"/>
      <ellipse cx="50" cy="62" rx="34" ry="11" fill="#c2410c"/></svg>);
  if(type==='triangle') return (
    <svg viewBox="0 0 100 100" style={s}>
      <path d="M50 18 L84 80 L16 80 Z" fill="none" stroke="#9ca3af" strokeWidth="9" strokeLinejoin="round"/>
      <path d="M50 18 L84 80 L16 80 Z" fill="none" stroke="#d1d5db" strokeWidth="3" strokeLinejoin="round"/>
      <circle cx="50" cy="18" r="5" fill="#6b7280"/>
      <line x1="70" y1="52" x2="92" y2="34" stroke="#92400e" strokeWidth="7" strokeLinecap="round"/></svg>);
  if(type==='tambourine') return (
    <svg viewBox="0 0 100 100" style={s}>
      <circle cx="50" cy="50" r="34" fill="#fde68a" stroke="#f59e0b" strokeWidth="8"/>
      {[[50,16],[78,30],[84,58],[64,82],[36,82],[16,58],[22,30]].map((p,i)=>
        <circle key={i} cx={p[0]} cy={p[1]} r="6.5" fill="#cbd5e1" stroke="#94a3b8" strokeWidth="2"/>)}
    </svg>);
  if(type==='castanets') return (
    <svg viewBox="0 0 100 100" style={s}>
      <path d="M24 52 A26 26 0 0 1 76 52 Z" fill="#ef4444" stroke="#991b1b" strokeWidth="3"/>
      <path d="M24 55 A26 26 0 0 0 76 55 Z" fill="#b91c1c" stroke="#991b1b" strokeWidth="3"/>
      <circle cx="50" cy="53" r="6" fill="#450a0a"/>
      <path d="M40 27 A10 10 0 0 1 60 27" fill="none" stroke="#fbbf24" strokeWidth="5"/></svg>);
  if(type==='my1'||type==='my2') return (
    <svg viewBox="0 0 100 100" style={s}>
      <circle cx="50" cy="50" r="36" fill={CUSTOM_COLORS[type]} stroke="#fff" strokeWidth="3"/>
      <rect x="40" y="28" width="20" height="32" rx="10" fill="#fff"/>
      <path d="M30 50 V58 Q30 72 50 72 Q70 72 70 58 V50" fill="none" stroke="#fff" strokeWidth="4" strokeLinecap="round"/>
      <line x1="50" y1="72" x2="50" y2="82" stroke="#fff" strokeWidth="4" strokeLinecap="round"/></svg>);
  return null;
}

function SpeakText({text}){
  const [idx,setIdx]=useState(-1);
  return (
    <div className="flex items-center gap-3">
      <span className="t-mid">{text.split('').map((c,i)=><span key={i} className={i<idx?'char-on':''}>{c}</span>)}</span>
      <button className="btn bg-indigo-400 text-white px-4 py-2 t-sm"
        onClick={()=>{ setIdx(0); speak(text,{onboundary:e=>setIdx(e.charIndex), onend:()=>setIdx(text.length)});
          if(!speakerRef.current) setIdx(-1); }}>🔊 듣기</button>
    </div>
  );
}

const STICKERS=['⭐','💖','🌸','🌟','🎉'];
function StickerPick({value,onPick}){
  return (
    <div className="flex flex-col items-center gap-2">
      <div className="t-mid text-indigo-600">녹음을 듣고 스스로 칭찬 스티커를 줘 봐요!</div>
      <div className="flex gap-3">
        {STICKERS.map(s=>(
          <button key={s} onClick={()=>onPick(s)}
            className={"text-5xl transition-transform "+(value===s?'pop scale-125':'opacity-50 hover:opacity-100 hover:scale-110')}>{s}</button>
        ))}
      </div>
    </div>
  );
}

/* ===== 일반 녹음(말로/글자로) ===== */
function RecorderUI({title, examples, onComplete}){
  const [mode,setMode]=useState(null);
  const [recording,setRecording]=useState(false);
  const [text,setText]=useState('');
  const [b64,setB64]=useState('');
  const [audioUrl,setAudioUrl]=useState('');
  const [helpUsed,setHelpUsed]=useState(false);
  const [showHelp,setShowHelp]=useState(false);
  const [sticker,setSticker]=useState('');
  const mr=useRef(null), chunks=useRef([]), sr=useRef(null);
  const textRef=useRef('');

  const startRec = async ()=>{
    chunks.current=[];
    try{
      const st = await navigator.mediaDevices.getUserMedia({audio:true});
      mr.current=new window.MediaRecorder(st);
      mr.current.ondataavailable=e=>chunks.current.push(e.data);
      mr.current.onstop=()=>{
        const blob=new Blob(chunks.current,{type:'audio/webm'});
        setAudioUrl(URL.createObjectURL(blob));
        const reader=new FileReader();
        reader.onloadend=()=>setB64(reader.result.split(',')[1]);
        reader.readAsDataURL(blob);
        st.getTracks().forEach(t=>t.stop());
      };
      mr.current.start(); setRecording(true); setMode('rec');
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(SR){
        const s=new SR(); s.lang='ko-KR'; s.interimResults=true; s.continuous=true;
        s.onresult=e=>{ const t=Array.from(e.results).map(r=>r[0].transcript).join('');
          textRef.current=t; setText(t); };
        sr.current=s; try{s.start();}catch(e){}
      }
    }catch(e){ alert('마이크를 사용할 수 없어요. 키보드로 입력해도 괜찮아요!'); setMode('type'); }
  };
  const stopRec = ()=>{
    if(mr.current && mr.current.state==='recording') mr.current.stop();
    if(sr.current){ try{sr.current.stop();}catch(e){} }
    setRecording(false); setMode('done');
  };
  const reset = ()=>{ setMode(null); setRecording(false); setText(''); textRef.current=''; setB64(''); setAudioUrl(''); setSticker(''); };

  return (
    <div className="card p-8 w-[760px] text-center fade-in">
      <h2 className="t-huge text-indigo-700 mb-4">{title}</h2>
      {mode===null && (
        <div className="flex flex-col items-center gap-4">
          <div className="flex gap-4">
            <button className="btn bg-indigo-500 text-white px-9 py-5 t-big" onClick={()=>{ Tone.start(); startRec(); }}>🎤 말로 녹음</button>
            <button className="btn bg-teal-400 text-white px-9 py-5 t-big" onClick={()=>setMode('type')}>⌨️ 글자로 쓰기</button>
          </div>
          <button className="btn bg-slate-300 text-slate-600 px-7 py-3 t-mid"
            onClick={()=>onComplete({text:'',b64:'',helpUsed,sticker:'',skipped:true})}>건너뛰기 →</button>
          <div className="t-sm text-slate-500">🎤 또는 ⌨️ 를 골라요</div>
        </div>
      )}
      {mode==='rec' && (
        <div className="flex flex-col items-center gap-3">
          <button onClick={stopRec} className="w-36 h-36 rounded-full bg-rose-400 flex items-center justify-center text-7xl float">⏹</button>
          <div className="t-big text-rose-500">녹음 중! 다 말하면 ⏹</div>
          <div className="t-mid text-slate-500 min-h-[40px] px-6">{text||'…'}</div>
        </div>
      )}
      {mode==='type' && (
        <div className="flex flex-col items-center gap-4">
          <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="여기에 내 생각을 써 봐요"
            className="w-full h-32 p-4 t-mid rounded-3xl border-4 border-indigo-200 outline-none focus:border-indigo-400"/>
          <button className="btn bg-indigo-500 text-white px-9 py-4 t-big" onClick={()=>setMode('done')} disabled={!text.trim()}>다 썼어요 ✓</button>
        </div>
      )}
      {mode==='done' && (
        <div className="flex flex-col items-center gap-4">
          <div className="w-24 h-24 rounded-full bg-emerald-400 flex items-center justify-center text-6xl pop">✅</div>
          {text && <div className="card p-3 w-full t-mid text-slate-600 bg-white/70">"{text}"</div>}
          <div className="flex gap-3 justify-center">
            {(audioUrl||text) && <button className="btn bg-violet-400 text-white px-7 py-3 t-mid"
              onClick={()=>{ if(audioUrl) new Audio(audioUrl).play(); else if(text) speak(text); }}>▶ 다시 들어보기</button>}
            <button className="btn bg-amber-300 text-amber-900 px-7 py-3 t-mid" onClick={reset}>🔁 다시 하기</button>
          </div>
          <StickerPick value={sticker} onPick={setSticker}/>
          <button className="btn bg-indigo-600 text-white px-10 py-4 t-big" disabled={!sticker}
            onClick={()=>{ confetti(); fx.yay(); onComplete({text,b64,helpUsed,sticker,skipped:false}); }}>
            {sticker?'다음으로 →':'스티커를 골라요'}
          </button>
        </div>
      )}
      {mode!=='done' && (
        <div className="mt-5"><button className="btn bg-yellow-300 text-yellow-900 px-6 py-3 t-mid"
          onClick={()=>{ setShowHelp(true); setHelpUsed(true); }}>💡 도움받기 (예시 보기)</button></div>
      )}
      {showHelp && (
        <div className="modal-bg" onClick={()=>setShowHelp(false)}>
          <div className="card p-7 w-[620px]" onClick={e=>e.stopPropagation()}>
            <div className="t-big text-indigo-700 mb-3">💡 이렇게 말해볼 수 있어요</div>
            <div className="flex flex-col gap-2 mb-4">
              {examples.map((ex,i)=><div key={i} className="bg-yellow-50 rounded-2xl p-3"><SpeakText text={ex}/></div>)}
            </div>
            <button className="btn bg-indigo-500 text-white px-7 py-3 t-mid w-full" onClick={()=>setShowHelp(false)}>알겠어요! 👍</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ===== 단계 안내 (한 문장씩) ===== */
function GuideModal({title, short, steps, onClose}){
  const [i,setI]=useState(0);
  useEffect(()=>{ const t=setTimeout(()=>speak(steps[0]),300); return ()=>clearTimeout(t); },[]);
  const go=(n)=>{ setI(n); speak(steps[n]); };
  const last = i>=steps.length-1;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="card p-8 w-[660px] text-center" onClick={e=>e.stopPropagation()}>
        <div className="t-huge text-indigo-700 mb-1">💡 {title}</div>
        <div className="t-mid text-slate-400 mb-4">{short}</div>
        <div className="flex justify-center gap-2 mb-5">
          {steps.map((_,k)=>(
            <div key={k} className="rounded-full transition-all"
              style={{width:k===i?34:14,height:14, background:k===i?'#7c6cf0':(k<i?'#c4b5fd':'#e5e0f5')}}/>
          ))}
        </div>
        <div className="bg-indigo-50 rounded-3xl px-6 flex items-center justify-center mb-6" style={{minHeight:160}}>
          <span className="t-huge text-slate-700" style={{lineHeight:1.3}}>{steps[i]}</span>
        </div>
        <div className="flex gap-3 justify-center">
          {i>0 && <button className="btn bg-slate-200 text-slate-600 t-big px-7 py-3" onClick={()=>go(i-1)}>← 이전</button>}
          {!last && <button className="btn bg-indigo-500 text-white t-big px-10 py-3" onClick={()=>go(i+1)}>다음 →</button>}
          {last && <button className="btn bg-emerald-500 text-white t-big px-10 py-3" onClick={onClose}>시작할게요! 👍</button>}
        </div>
      </div>
    </div>
  );
}

/* ===== 내 소리 슬롯 ===== */
function CustomSoundSlot({slot, info, onRecorded, onClear, onPreview, onRename}){
  const [recording,setRecording]=useState(false);
  const [timer,setTimer]=useState(0);
  const mr=useRef(null), chunks=useRef([]), tick=useRef(null);
  const stream=useRef(null);

  const start = async ()=>{
    try{
      const st = await navigator.mediaDevices.getUserMedia({audio:true});
      stream.current = st;
      chunks.current=[];
      mr.current=new window.MediaRecorder(st);
      mr.current.ondataavailable=e=>chunks.current.push(e.data);
      mr.current.onstop=async ()=>{
        const blob=new Blob(chunks.current,{type:'audio/webm'});
        const url=URL.createObjectURL(blob);
        st.getTracks().forEach(t=>t.stop());
        clearInterval(tick.current);
        setRecording(false);
        setTimer(0);
        await onRecorded(slot, url, blob);
      };
      mr.current.start(); setRecording(true);
      setTimer(0); tick.current=setInterval(()=>setTimer(t=>{
        if(t>=4){ // 5초 자동 종료 (0~4 = 5초)
          if(mr.current && mr.current.state==='recording') mr.current.stop();
          return t;
        }
        return t+1;
      }),1000);
    }catch(e){ alert('마이크를 사용할 수 없어요. 건너뛰어도 괜찮아요.'); }
  };
  const stop = ()=>{ if(mr.current && mr.current.state==='recording') mr.current.stop(); };

  return (
    <div className="card p-5 w-[320px] flex flex-col items-center gap-3">
      <InstIcon type={slot} size={64}/>
      <input type="text" value={info?.name || CUSTOM_DEFAULT_NAMES[slot]}
        onChange={e=>onRename(slot, e.target.value)}
        placeholder={CUSTOM_DEFAULT_NAMES[slot]}
        className="w-full t-mid text-center rounded-2xl bg-white/70 border-2 border-indigo-200 px-3 py-2 outline-none focus:border-indigo-400"/>
      {!info && !recording && (
        <button onClick={start} className="btn bg-indigo-500 text-white px-7 py-3 t-mid">🎤 녹음 시작</button>
      )}
      {recording && (
        <>
          <div className="w-20 h-20 rounded-full rec flex items-center justify-center text-4xl text-white">{5-timer}</div>
          <button onClick={stop} className="btn bg-rose-500 text-white px-6 py-2 t-mid">⏹ 끝</button>
        </>
      )}
      {info && !recording && (
        <div className="flex gap-2">
          <button onClick={()=>onPreview(slot)} className="btn bg-violet-400 text-white px-5 py-2 t-sm">▶ 들어보기</button>
          <button onClick={()=>onClear(slot)} className="btn bg-amber-300 text-amber-900 px-5 py-2 t-sm">🔁 다시</button>
        </div>
      )}
      {!info && !recording && (
        <div className="t-sm text-slate-400 text-center">박수·발구르기·책상 두드림 같은<br/>짧은 소리(5초)를 녹음해요</div>
      )}
    </div>
  );
}

/* =====================================================
   메인 앱
   ===================================================== */
function App(){
  const [view,setView]=useState('login');
  const [students,setStudents]=useState([]);
  const [student,setStudent]=useState(null);
  const [speakerOn,setSpeakerOn]=useState(false);

  const [situation,setSituation]=useState(null);
  const [bpm,setBpm]=useState(100);

  const [stage,setStage]=useState(1);
  const COLS=8;
  const [grid,setGrid]=useState(()=>[Array(COLS).fill(null),Array(COLS).fill(null),Array(COLS).fill(null)]);
  const [selectedInst,setSelectedInst]=useState('drum');
  const [isPlaying,setIsPlaying]=useState(false);
  const [step,setStep]=useState(-1);
  const [isMusicRec,setIsMusicRec]=useState(false);
  const [musicSaved,setMusicSaved]=useState(false);
  const [showGuide,setShowGuide]=useState(false);
  const [feedback,setFeedback]=useState('');

  const [chosenRule,setChosenRule]=useState(null);
  const [preferred,setPreferred]=useState(null);
  const [pairA,setPairA]=useState(null);
  const [pairB,setPairB]=useState(null);
  const [customSounds,setCustomSounds]=useState({my1:null,my2:null});

  const [reflection,setReflection]=useState([]);
  const [session,setSession]=useState({});

  const synths=useRef({}), loop=useRef(null), gridRef=useRef(grid), recorder=useRef(null);
  const players=useRef({my1:null,my2:null});

  /* scale */
  useEffect(()=>{
    const fit=()=>{
      const s=Math.min(window.innerWidth/1280, window.innerHeight/800);
      const stg=document.getElementById('stage');
      stg.style.transform=`scale(${s})`;
      stg.style.left=`${(window.innerWidth-1280*s)/2}px`;
      stg.style.top=`${(window.innerHeight-800*s)/2}px`;
    };
    fit(); window.addEventListener('resize',fit);
    return ()=>window.removeEventListener('resize',fit);
  },[]);

  useEffect(()=>{ speakerRef.current=speakerOn; },[speakerOn]);
  useEffect(()=>{ gridRef.current=grid; },[grid]);
  useEffect(()=>{ Tone.Transport.bpm.value=bpm; },[bpm]);

  /* 초기화 */
  useEffect(()=>{
    api.getStudents().then(r=>{ if(r.ok && r.students) setStudents(r.students); });

    synths.current={
      drum:new Tone.MembraneSynth({pitchDecay:0.05,octaves:4,envelope:{attack:0.001,decay:0.3,sustain:0.01}}).toDestination(),
      triangle:new Tone.FMSynth({harmonicity:1.5,modulationIndex:12,oscillator:{type:'sine'},envelope:{attack:0.001,decay:0.8,sustain:0,release:0.8}}).toDestination(),
      tambourine:new Tone.MetalSynth({frequency:280,envelope:{attack:0.001,decay:0.25,release:0.1},harmonicity:5.1,modulationIndex:32,resonance:4000,octaves:1.5}).toDestination(),
      castanets:new Tone.MembraneSynth({pitchDecay:0.001,octaves:0.1,envelope:{attack:0.001,decay:0.05,sustain:0}}).toDestination(),
    };
    // 음량 조정 — 탬버린·트라이앵글이 묻히지 않게
    synths.current.tambourine.volume.value = 8;
    synths.current.triangle.volume.value = -2;

    recorder.current=new Tone.Recorder();
    Tone.getDestination().connect(recorder.current);

    loop.current=new Tone.Sequence((time,col)=>{
      Tone.Draw.schedule(()=>setStep(col),time);
      let cnt=0;
      gridRef.current.forEach(row=>{
        const id=row[col];
        if(id){ cnt++; playOne(id,time); }
      });
      Tone.Draw.schedule(()=>{
        if(cnt>1) setFeedback('✨ 여러 악기가 함께! 소리가 풍부해져요!');
        else if(cnt===1) setFeedback('🎶 멋진 소리가 나고 있어요!');
      },time);
    },[0,1,2,3,4,5,6,7],'8n');

    return ()=>{
      Object.values(synths.current).forEach(s=>s&&s.dispose());
      Object.values(players.current).forEach(p=>p&&p.dispose());
      if(loop.current) loop.current.dispose();
    };
  },[]);

  /* 한 소리 재생 (time 옵션) */
  const playOne = (id, time)=>{
    if(id==='my1'||id==='my2'){
      const p = players.current[id];
      if(p && p.loaded){ try{ p.start(time); }catch(e){} }
      return;
    }
    const sy = synths.current[id];
    if(!sy) return;
    if(id==='triangle') sy.triggerAttackRelease('C8','16n',time);
    else if(id==='tambourine') sy.triggerAttackRelease('16n',time);
    else if(id==='castanets') sy.triggerAttackRelease('C5','32n',time);
    else sy.triggerAttackRelease('C2','8n',time);
  };

  /* 단계 들어올 때 안내 */
  useEffect(()=>{ if(view==='stage') setShowGuide(true); },[view,stage]);

  /* 한 번만 즉시 재생 */
  const trigger=async(id)=>{
    await Tone.start();
    if(id==='my1'||id==='my2'){
      const p = players.current[id];
      if(p && p.loaded){ try{ p.stop(); p.start(); }catch(e){} }
      return;
    }
    const sy=synths.current[id]; if(!sy) return;
    if(id==='triangle') sy.triggerAttackRelease('C8','16n');
    else if(id==='tambourine') sy.triggerAttackRelease('16n');
    else if(id==='castanets') sy.triggerAttackRelease('C5','32n');
    else sy.triggerAttackRelease('C2','8n');
  };

  /* 8박 패턴 한 번 재생 */
  const playPreset = async (pattern, instId='drum', useBpm=null)=>{
    await Tone.start();
    const t0 = Tone.now();
    const beat = 60 / (useBpm||bpm) / 2;
    pattern.forEach((v,i)=>{ if(v) playOne(instId, t0 + i*beat); });
  };

  /* 두 악기 "함께" 재생 — 매 박마다 동시에 */
  const playPair = async (a,b)=>{
    if(!a||!b) return;
    await Tone.start();
    const t0 = Tone.now();
    const beat = 60/bpm/2;
    for(let i=0;i<8;i++){
      const time = t0 + i*beat;
      playOne(a, time);
      if(a!==b) playOne(b, time);
    }
  };

  /* 내 소리 슬롯 핸들러 */
  const onRecordedSound = async (slot, url, blob)=>{
    // 기존 player 정리
    if(players.current[slot]){ try{ players.current[slot].dispose(); }catch(e){} }
    const player = new Tone.Player(url, ()=>{
      // 로드 완료 후 상태 업데이트
      setCustomSounds(p=>({...p, [slot]: {url, name: p[slot]?.name||CUSTOM_DEFAULT_NAMES[slot]}}));
    }).toDestination();
    players.current[slot] = player;
    await Tone.loaded();
    // 보장: 상태 한 번 더
    setCustomSounds(p=>({...p, [slot]: {url, name: p[slot]?.name||CUSTOM_DEFAULT_NAMES[slot]}}));
  };
  const onClearSound = (slot)=>{
    if(players.current[slot]){ try{ players.current[slot].dispose(); }catch(e){} players.current[slot]=null; }
    setCustomSounds(p=>({...p, [slot]: null}));
    // 그리드에서 사용 중인 것도 제거
    setGrid(g=>g.map(row=>row.map(c=>c===slot?null:c)));
    if(selectedInst===slot) setSelectedInst('drum');
  };
  const onPreviewSound = async (slot)=>{
    await Tone.start();
    const p = players.current[slot];
    if(p && p.loaded){ try{ p.stop(); p.start(); }catch(e){} }
  };
  const onRenameSound = (slot, name)=>{
    setCustomSounds(p=>({...p, [slot]: p[slot]?{...p[slot], name}:{name, url:null}}));
  };

  /* 현재 단계에서 보이는 악기 목록 */
  const visibleInstruments = ()=>{
    if(stage===1) return [INSTRUMENTS[0]];
    const customs = [];
    if(customSounds.my1?.url) customs.push({id:'my1', name:customSounds.my1.name||CUSTOM_DEFAULT_NAMES.my1, color:CUSTOM_COLORS.my1, custom:true});
    if(customSounds.my2?.url) customs.push({id:'my2', name:customSounds.my2.name||CUSTOM_DEFAULT_NAMES.my2, color:CUSTOM_COLORS.my2, custom:true});
    return [...INSTRUMENTS, ...customs];
  };
  const getInstObj = (id)=>{
    if(id==='my1'||id==='my2') return {id, name:customSounds[id]?.name||CUSTOM_DEFAULT_NAMES[id], color:CUSTOM_COLORS[id], custom:true};
    return INSTRUMENTS.find(i=>i.id===id);
  };

  /* 셀 클릭 */
  const handleCell=async(r,c)=>{
    await Tone.start();
    const ng=grid.map(row=>[...row]);
    if(stage===1){
      if(r!==0) return;
      if(ng[0][c]){ ng[0][c]=null; } else { ng[0][c]='drum'; trigger('drum'); }
    } else if(stage===2){
      if(r!==0) return;
      if(ng[0][c]){ ng[0][c]=null; } else { ng[0][c]=selectedInst; trigger(selectedInst); }
    } else {
      if(ng[r][c]===selectedInst){ ng[r][c]=null; }
      else { ng[r][c]=selectedInst; trigger(selectedInst); }
    }
    setGrid(ng);
  };

  /* 2단계: 통째 악기 교체 */
  const swapAllInstrument=(id)=>{
    setSelectedInst(id); trigger(id);
    setGrid(g=>{ const ng=g.map(r=>[...r]); ng[0]=ng[0].map(c=>c?id:null); return ng; });
    setFeedback(`${getInstObj(id).name}(으)로 바꿨어요! 느낌이 어떤가요?`);
  };

  /* 연주 */
  const play=async()=>{
    await Tone.start();
    if(!isPlaying){ Tone.Transport.start(); loop.current.start(0); setIsPlaying(true); setFeedback('전체 음악을 연주해요!'); }
    else { Tone.Transport.stop(); loop.current.stop(); setIsPlaying(false); setStep(-1); setFeedback('멈췄어요. 빈 칸을 눌러 바꿔봐요.'); }
  };
  const stopAll = ()=>{ Tone.Transport.stop(); if(loop.current) loop.current.stop(); setIsPlaying(false); setStep(-1); };

  /* 음악 녹음 */
  const musicRec=async()=>{
    await Tone.start();
    if(!isMusicRec){
      recorder.current.start(); setIsMusicRec(true);
      if(!isPlaying) play();
      setFeedback('🔴 음악 녹음 중!');
    } else {
      setIsMusicRec(false);
      const rec=await recorder.current.stop();
      const reader=new FileReader();
      reader.onloadend=async()=>{
        const b64=reader.result.split(',')[1];
        const res=await api.saveRecording({studentName:student.name,phase:'music',audioBase64:b64,mimeType:'audio/webm'});
        if(res.ok) setSession(p=>({...p,musicUrl:res.fileUrl}));
      };
      reader.readAsDataURL(rec);
      setMusicSaved(true); confetti(); fx.yay();
      setFeedback('✅ 음악이 저장되었어요!');
    }
  };

  /* 단계 이동 */
  const goStage=(n,opts={})=>{
    stopAll();
    setGrid(g=>{
      const ng=[Array(COLS).fill(null),Array(COLS).fill(null),Array(COLS).fill(null)];
      if(n===1 && opts.applyRule){
        const rp = RULE_PATTERNS.find(r=>r.id===opts.applyRule);
        if(rp) rp.pattern.forEach((v,i)=>{ if(v) ng[0][i]='drum'; });
      } else if(n===2){ ng[0]=[...g[0]]; }
      else if(n===3){ ng[0]=[...g[0]]; }
      return ng;
    });
    if(n===1) setSelectedInst('drum');
    if(n===2) setSelectedInst(grid[0].find(x=>x)||'drum');
    if(n===3) setSelectedInst(pairA||preferred||'tambourine');
    setStage(n); setView('stage');
    setFeedback(STAGE_INFO[n].short);
  };

  /* 뒤로 가기 */
  const goBack = ()=>{
    stopAll();
    if(view==='mySounds') setView('prerecord');
    else if(view==='situation') setView('mySounds');
    else if(view==='tempo') setView('situation');
    else if(view==='stage' && stage===1) setView('tempo');
    else if(view==='rule') { setStage(1); setView('stage'); }
    else if(view==='stage' && stage===2) setView('rule');
    else if(view==='preference') { setStage(2); setView('stage'); }
    else if(view==='pair') setView('preference');
    else if(view==='stage' && stage===3) setView('pair');
    else if(view==='reflection') { setStage(3); setView('stage'); }
    else if(view==='postrecord') setView('reflection');
    else if(view==='eval') setView('postrecord');
  };

  /* 최종 저장 */
  const saveAll = async ()=>{
    const data = {
      studentName: student.name,
      situation: situation? situation.name : '',
      preRecordText: session.preRecordText||'', preRecordUrl: session.preRecordUrl||'',
      preHelp: session.preHelp, preSticker: session.preSticker||'',
      stage1Pattern: grid[0].map(c=>c?'■':'·').join(''),
      stage2Instrument: getInstObj(selectedInst)?.name||selectedInst,
      stage3Pattern: grid.map(r=>r.map(c=>c?'■':'·').join('')).join(' / '),
      musicUrl: session.musicUrl||'',
      reflectionItems: [
        ...reflection,
        chosenRule? '발견한 규칙: '+(RULE_PATTERNS.find(r=>r.id===chosenRule)?.label||'') : '',
        preferred? '가장 좋아한 악기: '+(getInstObj(preferred)?.name||'') : '',
        (pairA&&pairB)? '어울리는 짝꿍: '+getInstObj(pairA).name+' + '+getInstObj(pairB).name : '',
        '빠르기: '+bpm+' BPM',
        (customSounds.my1?.url||customSounds.my2?.url)? '내 소리: '+[customSounds.my1?.name, customSounds.my2?.name].filter(Boolean).join(', ') : '',
      ].filter(Boolean).join(' / '),
      postRecordText: session.postRecordText||'', postRecordUrl: session.postRecordUrl||'',
      postHelp: session.postHelp, postSticker: session.postSticker||'',
      selfScore: session.selfScore, certified: true,
    };
    await api.saveData(data);
  };

  const BackBtn = ()=>(
    <button className="btn back-btn bg-slate-300 text-slate-600 px-5 py-2 t-sm" onClick={goBack}>← 이전</button>
  );

  /* ============ 렌더 ============ */
  return (
    <div style={{width:1280,height:800,position:'relative',padding:24}}>

      {view!=='login' && (
        <button onClick={()=>setSpeakerOn(!speakerOn)}
          className={"btn absolute top-6 right-6 px-6 py-3 t-mid z-50 "+(speakerOn?'bg-emerald-400 text-white':'bg-slate-300 text-slate-600')}>
          {speakerOn?'🔊 소리 켜짐':'🔇 소리 꺼짐'}
        </button>
      )}

      {/* ---- 로그인 ---- */}
      {view==='login' && (
        <div className="h-full flex flex-col items-center justify-center gap-7 fade-in">
          <div className="float text-7xl">🎵</div>
          <h1 className="t-title text-indigo-600">🎵 소리 탐험대 🎵</h1>
          <p className="t-big text-slate-500">소리를 탐색하고 나만의 음악을 만들어요</p>
          <div className="card p-9 w-[560px] flex flex-col gap-5">
            <select className="w-full p-4 t-big text-center rounded-3xl bg-indigo-50 border-4 border-indigo-200 outline-none focus:border-indigo-400"
              defaultValue="" onChange={e=>setStudent(students.find(s=>String(s.no)===e.target.value))}>
              <option value="" disabled>이름을 선택하세요</option>
              {students.map(s=><option key={s.no} value={s.no}>{s.name}</option>)}
            </select>
            <button className="btn bg-indigo-500 text-white t-huge px-12 py-5"
              onClick={async()=>{
                if(!student){ alert('이름을 선택하세요!'); return; }
                await Tone.start();
                try{ const st=await navigator.mediaDevices.getUserMedia({audio:true}); st.getTracks().forEach(t=>t.stop()); }
                catch(e){ alert('마이크 없이도 괜찮아요! 글자로 입력할 수 있어요.'); }
                setView('prerecord');
              }}>출발! 🚀</button>
          </div>
        </div>
      )}

      {/* ---- 사전 녹음 ---- */}
      {view==='prerecord' && (
        <div className="h-full flex flex-col items-center justify-center gap-5 fade-in">
          <div className="float text-6xl">🎵</div>
          <RecorderUI title="주변에서 어떤 소리가 들리나요?"
            examples={['교실에서 친구들 목소리가 들려요.','창밖에서 새가 지저귀어요.','시계가 째깍째깍 소리를 내요.','바람이 솔솔 부는 소리가 들려요.']}
            onComplete={async(r)=>{
              setSession(p=>({...p,preRecordText:r.text,preHelp:r.helpUsed,preSticker:r.sticker}));
              if(r.b64){ const res=await api.saveRecording({studentName:student.name,phase:'pre',audioBase64:r.b64,mimeType:'audio/webm'});
                if(res.ok) setSession(p=>({...p,preRecordUrl:res.fileUrl})); }
              setView('mySounds');
            }}/>
        </div>
      )}

      {/* ---- 내 소리 만들기 ---- */}
      {view==='mySounds' && (
        <div className="h-full flex flex-col items-center justify-center gap-4 fade-in">
          <BackBtn/>
          <h2 className="t-huge text-indigo-700">🌿 주변 소리를 내 악기로 만들어요</h2>
          <p className="t-mid text-slate-500">박수·발구르기·책상 두드림 같은 짧은 소리를 녹음해서<br/>나만의 악기로 써봐요 (최대 2개)</p>
          <div className="flex gap-6">
            <CustomSoundSlot slot="my1" info={customSounds.my1}
              onRecorded={onRecordedSound} onClear={onClearSound} onPreview={onPreviewSound} onRename={onRenameSound}/>
            <CustomSoundSlot slot="my2" info={customSounds.my2}
              onRecorded={onRecordedSound} onClear={onClearSound} onPreview={onPreviewSound} onRename={onRenameSound}/>
          </div>
          <p className="t-sm text-slate-400 text-center max-w-[760px]">
            녹음하지 않고 넘어가도 괜찮아요. 기본 악기 4개로도 멋진 음악을 만들 수 있어요!
          </p>
          <button onClick={()=>setView('situation')}
            className="btn bg-indigo-600 text-white t-big px-12 py-4">다음으로 →</button>
        </div>
      )}

      {/* ---- 상황 선택 ---- */}
      {view==='situation' && (
        <div className="h-full flex flex-col items-center justify-center gap-5 fade-in">
          <BackBtn/>
          <h2 className="t-huge text-indigo-700">어떤 장면의 음악을 만들어볼까요?</h2>
          <p className="t-mid text-slate-500">장면을 고르면 어울리는 빠르기로 시작해요</p>
          <div className="flex gap-6">
            {SITUATIONS.map(s=>(
              <button key={s.id} onClick={()=>{ setSituation(s); setBpm(s.bpm); trigger('drum'); }}
                className={"card p-6 w-[300px] flex flex-col items-center gap-2 transition-transform "+
                  (situation&&situation.id===s.id?'scale-105 ring-8 ring-indigo-300':'hover:scale-102')}>
                <div className="text-7xl">{s.emoji}</div>
                <div className="t-big text-indigo-700 text-center">{s.name}</div>
                <div className="t-sm text-slate-500">{s.desc}</div>
              </button>
            ))}
          </div>
          {situation && <div className="card px-7 py-3 t-mid text-indigo-600 fade-in">{situation.emoji} {situation.hint}</div>}
          <button className="btn bg-indigo-600 text-white t-big px-12 py-4" disabled={!situation}
            onClick={()=>setView('tempo')}>{situation?'빠르기 정하러 가기 →':'장면을 골라요'}</button>
        </div>
      )}

      {/* ---- 빠르기 ---- */}
      {view==='tempo' && (
        <div className="h-full flex flex-col items-center justify-center gap-4 fade-in">
          <BackBtn/>
          <h2 className="t-huge text-indigo-700">🐢 빠르기를 들어보고 정해요</h2>
          <p className="t-mid text-slate-500">"{situation?.name}" 에 어울리는 빠르기는 어떨까요?</p>
          <div className="flex gap-5">
            {TEMPO_PRESETS.map(p=>(
              <button key={p.id} onClick={()=>{ setBpm(p.bpm); playPreset([1,1,1,1,1,1,1,1],'drum',p.bpm); }}
                className={"card p-5 w-[220px] flex flex-col items-center gap-1 hover:scale-105 transition-transform "+
                  (bpm===p.bpm?'ring-8 ring-indigo-300':'')}>
                <div className="text-6xl">{p.emoji}</div>
                <div className="t-big text-indigo-700">{p.label}</div>
                <div className="t-sm text-slate-500">{p.bpm} BPM</div>
                <div className="t-sm text-indigo-500 mt-1">▶ 눌러서 듣기</div>
              </button>
            ))}
          </div>
          <div className="card p-5 w-[700px] flex flex-col items-center gap-2">
            <div className="t-mid text-slate-600">내 빠르기 세밀하게 정하기</div>
            <div className="flex items-center gap-4">
              <span className="text-3xl">🐢</span>
              <input type="range" min="40" max="160" value={bpm} onChange={e=>setBpm(Number(e.target.value))} style={{width:380}}/>
              <span className="text-3xl">🐰</span>
            </div>
            <div className="flex items-center gap-4">
              <span className="t-big text-indigo-700">{bpm} BPM</span>
              <button onClick={()=>playPreset([1,1,1,1,1,1,1,1],'drum',bpm)}
                className="btn bg-emerald-400 text-white px-6 py-2 t-mid">▶ 지금 빠르기 듣기</button>
            </div>
          </div>
          <button onClick={()=>goStage(1)} className="btn bg-indigo-600 text-white t-big px-12 py-4">이 빠르기로 정할게요 →</button>
        </div>
      )}

      {/* ---- 단계 ---- */}
      {view==='stage' && (
        <div className="h-full flex flex-col fade-in">
          {stage>1 && <BackBtn/>}
          <div className="flex items-center gap-3 mb-2 pr-44" style={{height:62}}>
            <div className="float text-5xl">🎵</div>
            <div className="card px-5 py-2 flex-1 flex items-center" style={{minWidth:0}}>
              <span className="t-sm text-indigo-700 truncate">{feedback||STAGE_INFO[stage].short}</span>
            </div>
            <button className="btn bg-amber-300 text-amber-900 px-5 py-2 t-sm whitespace-nowrap"
              onClick={()=>setShowGuide(true)}>💡 도움말</button>
            <div className="card px-4 py-1 flex items-center gap-2">
              <span className="text-2xl">🐢</span>
              <input type="range" min="50" max="150" value={bpm} onChange={e=>setBpm(Number(e.target.value))}/>
              <span className="text-2xl">🐰</span>
            </div>
          </div>

          <div className="flex items-center justify-center gap-3 mb-2" style={{height:42}}>
            {situation && <div className="card px-4 py-1 t-sm text-indigo-600 whitespace-nowrap">{situation.emoji} {situation.name}</div>}
            <div className="t-big text-indigo-700 whitespace-nowrap">{STAGE_INFO[stage].title}</div>
          </div>

          <div className="flex justify-center gap-3 mb-2 flex-wrap">
            {visibleInstruments().map(inst=>(
              <div key={inst.id}
                onClick={()=>{
                  if(stage===2){ swapAllInstrument(inst.id); }
                  else { setSelectedInst(inst.id); trigger(inst.id); setFeedback(`${inst.name} 선택! 빈 칸을 눌러요.`); }
                }}
                className={"inst-card "+(selectedInst===inst.id?'sel':'')}
                style={{width:118,height:104,padding:6,background:selectedInst===inst.id?inst.color:'rgba(255,255,255,0.78)'}}>
                <InstIcon type={inst.id} size={48}/>
                <span className="t-sm mt-1 text-slate-700 text-center" style={{lineHeight:1.1,fontSize:inst.name.length>5?16:20}}>{inst.name}</span>
              </div>
            ))}
          </div>

          <div className="flex-1 flex items-center justify-center">
            <div className="card p-5" style={{maxWidth:1040}}>
              <div className="flex justify-around mb-3 px-1">
                {Array(COLS).fill('쿵').map((l,i)=>(
                  <span key={i} className={"t-big transition-all "+(step===i?'text-indigo-700 scale-150':'text-indigo-300')}>{l}</span>
                ))}
              </div>
              <div className="flex flex-col gap-2">
                {grid.map((row,r)=>{
                  if(stage!==3 && r>0) return null;
                  return (
                    <div key={r} className="flex gap-2 justify-center">
                      {row.map((cell,c)=>{
                        const inst=cell?getInstObj(cell):null;
                        const sz=stage===3?74:92;
                        return (
                          <div key={c} onClick={()=>handleCell(r,c)}
                            className={"beat-cell "+(step===c?'now ':'')+(inst?'filled':'')}
                            style={{width:sz,height:sz, background:inst?inst.color:undefined}}>
                            {inst && <InstIcon type={inst.id} size={sz*0.66}/>}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="flex items-center justify-center gap-5 mt-1" style={{height:104}}>
            <button onClick={play}
              className={"btn t-big px-12 py-4 text-white "+(isPlaying?'bg-rose-400':'bg-indigo-500')}>
              {isPlaying?'멈춤 ⏹':'연주 ▶'}
            </button>
            {stage===1 && <button className="btn bg-emerald-400 text-white t-big px-8 py-4"
              onClick={()=>{ stopAll(); setView('rule'); }}>다음 →</button>}
            {stage===2 && <button className="btn bg-emerald-400 text-white t-big px-8 py-4"
              onClick={()=>{ stopAll(); setView('preference'); }}>다음 →</button>}
            {stage===3 && (<>
              <button onClick={musicRec}
                className={"btn t-big px-8 py-4 text-white "+(isMusicRec?'bg-red-500':'bg-pink-500')}>
                {isMusicRec?'녹음 끝 ⏹':'🎵 음악 녹음'}
              </button>
              {musicSaved && <button className="btn bg-violet-500 text-white t-big px-8 py-4 float"
                onClick={()=>{ stopAll(); setView('reflection'); }}>🎤 다음으로 →</button>}
            </>)}
          </div>
        </div>
      )}

      {/* ---- 규칙 탐험 ---- */}
      {view==='rule' && (
        <div className="h-full flex flex-col items-center justify-center gap-3 fade-in">
          <BackBtn/>
          <h2 className="t-huge text-indigo-700">📐 음악에는 '규칙'이 있어요</h2>
          <p className="t-mid text-slate-500">한 번씩 들어보고, 어떤 규칙이 느껴지는지 골라봐요</p>
          <div className="flex gap-4">
            {RULE_PATTERNS.map(rp=>(
              <button key={rp.id} onClick={()=>{ setChosenRule(rp.id); playPreset(rp.pattern,'drum'); }}
                className={"card p-4 w-[240px] flex flex-col items-center gap-2 transition-transform "+
                  (chosenRule===rp.id?'ring-8 ring-indigo-300 scale-105':'hover:scale-102')}>
                <div className="t-big text-indigo-700">{rp.label}</div>
                <div className="flex gap-1 justify-center">
                  {rp.pattern.map((v,i)=>(
                    <div key={i} style={{width:20,height:20,borderRadius:6, background:v?'#7c6cf0':'#e5e0f5'}}/>
                  ))}
                </div>
                <div className="t-sm text-slate-500">{rp.desc}</div>
                <div className="t-sm text-indigo-500">▶ 눌러서 듣기</div>
              </button>
            ))}
          </div>
          <p className="t-sm text-slate-500 text-center max-w-[820px]">
            음악은 그냥 마구 배열하는 게 아니라, 같은 간격으로 박이 반복되는 <b>규칙</b>이 있어요.
          </p>
          <div className="flex gap-3 flex-wrap justify-center">
            <button onClick={()=>{ if(chosenRule) goStage(1,{applyRule:chosenRule}); }} disabled={!chosenRule}
              className="btn bg-amber-400 text-amber-900 t-big px-7 py-3">🔁 이 규칙으로 다시 만들기</button>
            <button onClick={()=>goStage(2)} disabled={!chosenRule}
              className="btn bg-indigo-600 text-white t-big px-10 py-3">다음 단계로 →</button>
          </div>
          {!chosenRule && <div className="t-sm text-slate-400">규칙을 하나 들어보고 골라요</div>}
        </div>
      )}

      {/* ---- 좋아하는 악기 ---- */}
      {view==='preference' && (
        <div className="h-full flex flex-col items-center justify-center gap-4 fade-in">
          <BackBtn/>
          <h2 className="t-huge text-indigo-700">❤️ 가장 마음에 든 악기는?</h2>
          <p className="t-mid text-slate-500">눌러서 들어보고, 가장 좋았던 악기를 골라봐요</p>
          <div className="flex gap-4 flex-wrap justify-center">
            {visibleInstruments().map(inst=>(
              <button key={inst.id} onClick={()=>{ trigger(inst.id); setPreferred(inst.id); }}
                className={"card p-4 w-[180px] flex flex-col items-center gap-2 transition-transform "+
                  (preferred===inst.id?'ring-8 ring-pink-300 scale-105':'hover:scale-102')}
                style={{background:preferred===inst.id?inst.color:undefined}}>
                <InstIcon type={inst.id} size={64}/>
                <div className="t-mid text-slate-700 text-center" style={{lineHeight:1.1}}>{inst.name}</div>
                <div className="t-sm text-indigo-500">🔊 눌러서 듣기</div>
              </button>
            ))}
          </div>
          <p className="t-sm text-slate-400 text-center max-w-[760px]">취향은 사람마다 달라요. 정답은 없어요!</p>
          <button onClick={()=>setView('pair')} disabled={!preferred}
            className="btn bg-indigo-600 text-white t-big px-12 py-4">{preferred?'다음으로 →':'하나 골라요'}</button>
        </div>
      )}

      {/* ---- 짝꿍 찾기 ---- */}
      {view==='pair' && (
        <div className="h-full flex flex-col items-center justify-center gap-4 fade-in">
          <BackBtn/>
          <h2 className="t-huge text-indigo-700">🤝 어떤 악기가 함께 어울릴까요?</h2>
          <p className="t-mid text-slate-500">악기 두 개를 골라서 동시에 들어봐요</p>
          <div className="flex gap-4 justify-center flex-wrap">
            {visibleInstruments().map(inst=>{
              const badge = pairA===inst.id ? '①' : pairB===inst.id ? '②' : null;
              return (
                <button key={inst.id}
                  onClick={()=>{
                    if(pairA===inst.id){ setPairA(pairB); setPairB(null); }
                    else if(pairB===inst.id){ setPairB(null); }
                    else if(!pairA){ setPairA(inst.id); trigger(inst.id); }
                    else if(!pairB){ setPairB(inst.id); trigger(inst.id); }
                    else { setPairA(pairB); setPairB(inst.id); trigger(inst.id); }
                  }}
                  className={"card p-4 w-[180px] flex flex-col items-center gap-2 relative transition-transform "+
                    (badge?'scale-105':'hover:scale-102')}
                  style={{background:badge?inst.color:undefined}}>
                  {badge && <div className="absolute top-2 right-2 w-12 h-12 rounded-full bg-white shadow-lg flex items-center justify-center text-3xl text-indigo-600">{badge}</div>}
                  <InstIcon type={inst.id} size={60}/>
                  <div className="t-mid text-slate-700 text-center" style={{lineHeight:1.1}}>{inst.name}</div>
                </button>
              );
            })}
          </div>
          <div className="t-sm text-slate-500">{pairA&&pairB?'두 악기를 골랐어요! 함께 들어볼까요?':'악기를 두 개 골라요'}</div>
          <button onClick={()=>playPair(pairA,pairB)} disabled={!pairA||!pairB}
            className="btn bg-emerald-500 text-white t-big px-9 py-4">▶ 두 악기 동시에 듣기</button>
          <button onClick={()=>goStage(3)} disabled={!pairA||!pairB}
            className="btn bg-indigo-600 text-white t-big px-12 py-4">이 짝꿍으로 정할게요 →</button>
        </div>
      )}

      {/* ---- 배움 정리 ---- */}
      {view==='reflection' && (
        <div className="h-full flex flex-col items-center justify-center gap-5 fade-in">
          <BackBtn/>
          <div className="float text-5xl">🎵</div>
          <h2 className="t-huge text-indigo-700">오늘 알게 된 것을 골라봐요</h2>
          <p className="t-mid text-slate-500">맞다고 생각하는 것을 모두 눌러요</p>
          <div className="flex flex-col gap-3 w-[760px]">
            {[
              '악기마다 소리와 느낌이 달라요',
              '여러 악기를 함께 연주하면 소리가 풍부해져요',
              '빠르기에 따라 장면의 느낌이 달라져요',
              '음악에는 일정한 박과 규칙이 있어요',
              '주변 소리도 멋진 악기가 될 수 있어요',
            ].map(item=>(
              <button key={item} onClick={()=>setReflection(p=>p.includes(item)?p.filter(x=>x!==item):[...p,item])}
                className={"card p-4 t-mid text-left transition-transform "+
                  (reflection.includes(item)?'ring-8 ring-emerald-300 bg-emerald-50 scale-102':'hover:scale-101')}>
                {reflection.includes(item)?'✅ ':'⬜ '}{item}
              </button>
            ))}
          </div>
          <button className="btn bg-indigo-600 text-white t-big px-12 py-4" disabled={reflection.length===0}
            onClick={()=>setView('postrecord')}>{reflection.length?'발표하러 가기 →':'하나 이상 골라요'}</button>
        </div>
      )}

      {/* ---- 발표 ---- */}
      {view==='postrecord' && (
        <div className="h-full flex flex-col items-center justify-center gap-5 fade-in">
          <BackBtn/>
          <div className="float text-5xl">🎵</div>
          <RecorderUI title={`'${situation?situation.name:''}'에 맞게 어떻게 만들었나요?`}
            examples={[
              '달팽이처럼 천천히 칸을 띄엄띄엄 채웠어요.',
              '친구가 뛰는 것처럼 빠르게 만들었어요.',
              '두 박마다 작은 북을 넣어 규칙을 만들었어요.',
              '내가 녹음한 박수 소리를 악기로 썼어요.',
            ]}
            onComplete={async(r)=>{
              setSession(p=>({...p,postRecordText:r.text,postHelp:r.helpUsed,postSticker:r.sticker}));
              if(r.b64){ const res=await api.saveRecording({studentName:student.name,phase:'post',audioBase64:r.b64,mimeType:'audio/webm'});
                if(res.ok) setSession(p=>({...p,postRecordUrl:res.fileUrl})); }
              setView('eval');
            }}/>
        </div>
      )}

      {/* ---- 자기평가 ---- */}
      {view==='eval' && (
        <div className="h-full flex flex-col items-center justify-center fade-in">
          <BackBtn/>
          <div className="card p-10 w-[680px] text-center flex flex-col gap-4">
            <h2 className="t-huge text-indigo-700">별표로 내 다짐을 평가해볼까요?</h2>
            <p className="t-mid text-slate-500">오늘 활동에 얼마나 열심히 도전했나요?</p>
            <div className="flex justify-center gap-2">
              {[1,2,3,4,5].map(i=>(
                <span key={i} onClick={()=>setSession(p=>({...p,selfScore:i}))}
                  className={"text-7xl cursor-pointer transition-transform "+
                    (session.selfScore>=i?'text-yellow-400 scale-110':'text-slate-300')}>★</span>
              ))}
            </div>
            {session.selfScore>0 && session.selfScore<=3 && (
              <p className="t-big text-pink-500 float">조금 더 도전하면 멋질 거예요! 다시 해볼까요?</p>
            )}
            {session.selfScore>3 && (<p className="t-big text-emerald-500">끝까지 해낸 끈기가 정말 멋져요! 🌟</p>)}
            <div className="flex flex-col gap-2 mt-1">
              {session.selfScore>0 && session.selfScore<=3 && (
                <button className="btn bg-pink-500 text-white t-big px-10 py-4"
                  onClick={()=>{ setMusicSaved(false); setView('tempo'); }}>🔁 빠르기부터 다시</button>
              )}
              {session.selfScore>3 && (<>
                <button className="btn bg-indigo-600 text-white t-big px-10 py-4"
                  onClick={async()=>{ await saveAll(); confetti(); fx.yay(); setView('finish'); }}>🏅 수료증 받기!</button>
                <button className="btn bg-slate-300 text-slate-600 t-mid px-7 py-2"
                  onClick={()=>{ setMusicSaved(false); setView('tempo'); }}>그래도 다시 해보고 싶어요</button>
              </>)}
            </div>
          </div>
        </div>
      )}

      {/* ---- 수료증 ---- */}
      {view==='finish' && (
        <div className="h-full flex flex-col items-center justify-center gap-4 fade-in">
          <div className="bg-white w-[900px] rounded-[36px] border-[12px] border-indigo-200 shadow-2xl overflow-hidden">
            <div className="bg-indigo-500 text-white py-4 text-center">
              <div className="t-mid tracking-widest">제 2026 - 001 호</div>
              <div className="t-title">🏅 소리 탐험 수료증</div>
            </div>
            <div className="py-5 text-center border-b-4 border-dashed border-indigo-100">
              <div className="t-mid text-slate-400">탐험가</div>
              <div className="t-huge text-indigo-700">{student?student.name:''}</div>
            </div>
            <div className="py-6 px-10 text-center">
              <p className="t-big text-slate-700 leading-relaxed">
                위 탐험가는 <span className="text-pink-500">'소리 탐험대'</span> 활동을 통해<br/>
                빠르기 · 규칙 · 악기의 어울림을 탐구하고<br/>
                장면에 어울리는 <span className="text-indigo-600">나만의 음악</span>을 완성하였기에<br/>
                이 증서를 드립니다.
              </p>
            </div>
            <div className="bg-indigo-50 py-5 px-10 flex items-center justify-center gap-10 border-t-4 border-indigo-100">
              <div className="text-6xl">🎖️</div>
              <div className="t-big text-indigo-600">{new Date().toLocaleDateString('ko-KR')}</div>
            </div>
          </div>
          <button className="btn bg-indigo-600 text-white t-big px-12 py-4" onClick={()=>window.location.reload()}>처음으로 돌아가기</button>
        </div>
      )}

      {/* ---- 단계 안내 팝업 ---- */}
      {showGuide && view==='stage' && (
        <GuideModal key={stage} title={STAGE_INFO[stage].title} short={STAGE_INFO[stage].short}
          steps={STAGE_INFO[stage].steps} onClose={()=>setShowGuide(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
