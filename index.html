<style>

/* 글씨 크기 - 저학년용 크게 */

/* 폭죽 */

}
/* 스티커 팡 */

  60%{transform:scale(1.3) rotate(10deg);opacity:1;}

.pop{animation:pop .5s ease-out;}
.float{animation:floaty 3s ease-in-out infinite;}

<body>
<div id="viewport"><div id="stage"><div id="root"></div></div></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ===== 구글 앱스 스크립트 배포 URL ===== */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwE4cXnPyYcBOwsWcjlit2jJawm-mZ-jcrS-fR0-ovCXcWnw9rfq6yDNJ3OL0k99AY/exec';

/* ===== API ===== */
const api = {
  request: async (action,data={})=>{
    if(!GAS_URL){
      if(action==='getStudents') return {ok:true,students:[{no:1,name:'홍길동 (테스트)'},{no:2,name:'김민준 (테스트)'}]};
      if(action==='getQuestions') return {ok:true,questions:[]};
      if(action==='saveRecording') return new Promise(r=>setTimeout(()=>r({ok:true,fileUrl:'http://mock'}),800));
      return {ok:true};
    }
    try{
      const res = await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,...data})});
      return await res.json();
    }catch(e){return {ok:false,error:e.message};}
  },
  getStudents:()=>api.request('getStudents'),
  getQuestions:()=>api.request('getQuestions'),
  saveRecording:(d)=>api.request('saveRecording',d),
  saveData:(d)=>api.request('saveData',d)
};

/* ===== 스피커 / TTS ===== */
const speakerRef = React.createRef(); speakerRef.current = false;

function pickKoreanVoice(){
  const vs = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  let v = vs.find(x=>x.lang==='ko-KR' && x.name.toLowerCase().includes('google') && !x.localService);
  if(!v) v = vs.find(x=>/ko-KR/.test(x.lang) && /wavenet|neural2?/i.test(x.name));
  if(!v) v = vs.find(x=>/ko-KR/.test(x.lang) && /wavenet|neural|premium|enhanced|natural/i.test(x.name));
  if(!v) v = vs.find(x=>x.lang==='ko-KR' && x.name.toLowerCase().includes('google'));
  if(!v) v = vs.find(x=>x.lang==='ko-KR');
  return v;
}
function speak(text,opts={}){
  if(!speakerRef.current) return;
  if(!window.speechSynthesis) return;
  const synth = window.speechSynthesis;
  if(synth.speaking) synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const v = pickKoreanVoice(); if(v) u.voice=v;
  u.lang='ko-KR'; u.rate=opts.rate||0.95; u.pitch=opts.pitch||1.0;
  if(opts.onboundary) u.onboundary=opts.onboundary;
  if(opts.onend) u.onend=opts.onend;
  synth.speak(u);
}
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=()=>{};

/* ===== 효과음 (스피커 켜졌을 때만) ===== */
const fx = {synth:null,
  init(){ if(!this.synth) this.synth = new Tone.Synth({oscillator:{type:'triangle'}}).toDestination(); },
  correct(){ if(!speakerRef.current)return; this.init(); const n=Tone.now();
    this.synth.triggerAttackRelease('C5',0.12,n); this.synth.triggerAttackRelease('E5',0.12,n+0.12); this.synth.triggerAttackRelease('G5',0.2,n+0.24);},
  wrong(){ if(!speakerRef.current)return; this.init(); const n=Tone.now();
    this.synth.triggerAttackRelease('A3',0.18,n); this.synth.triggerAttackRelease('F3',0.25,n+0.16);},
  yay(){ if(!speakerRef.current)return; this.init(); const n=Tone.now();
    ['C5','E5','G5','C6','E6'].forEach((nt,i)=>this.synth.triggerAttackRelease(nt,0.15,n+i*0.1));}
};

/* ===== 폭죽 ===== */
function confetti(){
  const colors=['#fbbf24','#f472b6','#34d399','#60a5fa','#a78bfa','#fb7185'];
  for(let i=0;i<46;i++){
    const d=document.createElement('div');
    d.className='confetti';
    d.style.left=Math.random()*100+'vw';
    d.style.background=colors[Math.floor(Math.random()*colors.length)];
    d.style.animation=`fall ${1.6+Math.random()*1.4}s ease-in ${Math.random()*0.4}s forwards`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),3600);
  }
}

/* ===== 악기 (저학년 기본 악기 4종) ===== */
const INSTRUMENTS = [
  {id:'drum',     name:'작은 북',   color:'#fb923c', emoji:'🥁'},
  {id:'triangle', name:'트라이앵글', color:'#fbbf24', emoji:'📐'},
  {id:'tambourine',name:'탬버린',   color:'#f472b6', emoji:'🟡'},
  {id:'castanets',name:'캐스터네츠', color:'#f87171', emoji:'🐚'},
];

      <ellipse cx="50" cy="34" rx="34" ry="11" fill="#fff7ed" stroke="#9a3412" strokeWidth="3"/>
      <path d="M16 34 V62 Q16 73 50 73 Q84 73 84 62 V34" fill="#ea580c" stroke="#9a3412" strokeWidth="3"/>
      <ellipse cx="50" cy="62" rx="34" ry="11" fill="#c2410c"/>
    </svg>);

    <svg viewBox="0 0 100 100" style={s}>
      <path d="M50 18 L84 80 L16 80 Z" fill="none" stroke="#9ca3af" strokeWidth="9" strokeLinejoin="round"/>

  if(type==='tambourine') return (
    <svg viewBox="0 0 100 100" style={s}>
      <circle cx="50" cy="50" r="34" fill="#fde68a" stroke="#f59e0b" strokeWidth="8"/>
      {[[50,16],[78,30],[84,58],[64,82],[36,82],[16,58],[22,30]].map((p,i)=>
        <circle key={i} cx={p[0]} cy={p[1]} r="6.5" fill="#cbd5e1" stroke="#94a3b8" strokeWidth="2"/>)}

  if(type==='castanets') return (
    <svg viewBox="0 0 100 100" style={s}>
      <path d="M24 52 A26 26 0 0 1 76 52 Z" fill="#ef4444" stroke="#991b1b" strokeWidth="3"/>
      <path d="M24 55 A26 26 0 0 0 76 55 Z" fill="#b91c1c" stroke="#991b1b" strokeWidth="3"/>
      <circle cx="50" cy="53" r="6" fill="#450a0a"/>
      <path d="M40 27 A10 10 0 0 1 60 27" fill="none" stroke="#fbbf24" strokeWidth="5"/>
    </svg>);
  return null;
}

/* ===== 상황 ===== */
const SITUATIONS = [
  {id:'snail', emoji:'🐌', name:'달팽이가 기어가요', desc:'아주 천천히 움직여요', bpm:62, hint:'느릿느릿 천천히! 칸을 띄엄띄엄 채워볼까요?'},
  {id:'run',   emoji:'🏃', name:'운동장에서 친구가 뛰어요', desc:'다다다다 빠르게 달려요', bpm:132, hint:'다다다다! 빠르게 칸을 많이 채워볼까요?'},
  {id:'rest',  emoji:'🛝', name:'즐거운 쉬는 시간', desc:'신나고 즐거워요', bpm:104, hint:'신나는 느낌! 자유롭게 만들어볼까요?'},
];

/* ===== 단계 안내 (짧게) ===== */
const STAGE_INFO = {
  1:{title:'1단계 · 박 느끼기', short:'작은 북을 빈 칸에 콕콕! 박을 느껴봐요.',
     guide:'빈 칸을 누르면 작은 북이 들어가요.\n한 번 더 누르면 빠져요.\n[연주]를 눌러 들어봐요!'},
  2:{title:'2단계 · 악기 바꾸기', short:'박자는 그대로! 악기만 바꿔서 느낌을 비교해요.',
     guide:'아래 악기를 누르면\n전체 박자의 악기가 바뀌어요.\n악기마다 느낌이 달라요!'},
  3:{title:'3단계 · 악기 섞기', short:'여러 악기를 함께! 풍부한 소리를 만들어요.',
     guide:'여러 줄에 악기를 넣어보세요.\n같이 연주되면 소리가 풍부해져요.\n[음악 녹음]으로 저장해요!'},
};

/* ===== 따라읽기 하이라이트 텍스트 ===== */
function SpeakText({text}){
  const [idx,setIdx]=useState(-1);
  return (
    <div className="flex items-center gap-3">
      <span className="t-mid">
        {text.split('').map((c,i)=><span key={i} className={i<idx?'char-on':''}>{c}</span>)}
      </span>
      <button className="btn bg-indigo-400 text-white px-4 py-2 t-sm"
        onClick={()=>{ setIdx(0);
          speak(text,{onboundary:e=>setIdx(e.charIndex), onend:()=>setIdx(text.length)});
          if(!speakerRef.current) setIdx(-1);
        }}>🔊 듣기</button>
    </div>
  );
}

/* ===== 칭찬 스티커 선택 ===== */
const STICKERS=['⭐','💖','🌸','🌟','🎉'];
function StickerPick({value,onPick}){
  return (
    <div className="flex flex-col items-center gap-2">
      <div className="t-mid text-indigo-600">녹음을 듣고 스스로 칭찬 스티커를 줘 봐요!</div>
      <div className="flex gap-3">
        {STICKERS.map(s=>(
          <button key={s} onClick={()=>onPick(s)}
            className={"text-5xl transition-transform "+(value===s?'pop scale-125':'opacity-50 hover:opacity-100 hover:scale-110')}>
            {s}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ===== 녹음 컴포넌트 ===== */
function RecorderUI({title, examples, phase, micGranted, onComplete}){
  const [mode,setMode]=useState(null);        // null | 'rec' | 'type' | 'done'
  const [recording,setRecording]=useState(false);
  const [text,setText]=useState('');
  const [b64,setB64]=useState('');
  const [audioUrl,setAudioUrl]=useState('');
  const [helpUsed,setHelpUsed]=useState(false);
  const [showHelp,setShowHelp]=useState(false);
  const [sticker,setSticker]=useState('');
  const mr=useRef(null), chunks=useRef([]), sr=useRef(null), stream=useRef(null);
  const textRef=useRef('');

  const startRec = async ()=>{
    chunks.current=[];
    try{
      const st = await navigator.mediaDevices.getUserMedia({audio:true});
      stream.current=st;
      mr.current=new window.MediaRecorder(st);
      mr.current.ondataavailable=e=>chunks.current.push(e.data);
      mr.current.onstop=()=>{
        const blob=new Blob(chunks.current,{type:'audio/webm'});
        setAudioUrl(URL.createObjectURL(blob));
        const reader=new FileReader();
        reader.onloadend=()=>{ setB64(reader.result.split(',')[1]); };
        reader.readAsDataURL(blob);
        st.getTracks().forEach(t=>t.stop());
      };
      mr.current.start(); setRecording(true); setMode('rec');
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(SR){
        const s=new SR(); s.lang='ko-KR'; s.interimResults=true; s.continuous=true;
        s.onresult=e=>{ const t=Array.from(e.results).map(r=>r[0].transcript).join('');
          textRef.current=t; setText(t); };
        sr.current=s; try{s.start();}catch(e){}
      }
    }catch(e){ alert('마이크를 사용할 수 없어요. 키보드로 입력해도 괜찮아요!'); setMode('type'); }
  };
  const stopRec = ()=>{
    if(mr.current && mr.current.state==='recording') mr.current.stop();
    if(sr.current){ try{sr.current.stop();}catch(e){} }
    setRecording(false); setMode('done');
  };
  const reset = ()=>{
    setMode(null); setRecording(false); setText(''); textRef.current='';
    setB64(''); setAudioUrl(''); setSticker('');
  };

  return (
    <div className="card p-10 w-[760px] text-center fade-in">
      <h2 className="t-huge text-indigo-700 mb-5">{title}</h2>

      {/* 시작 선택 */}
      {mode===null && (
        <div className="flex flex-col items-center gap-5">
          <div className="flex gap-5">
            <button className="btn bg-indigo-500 text-white px-10 py-6 t-big"
              onClick={()=>{ Tone.start(); startRec(); }}>🎤 말로 녹음하기</button>
            <button className="btn bg-teal-400 text-white px-10 py-6 t-big"
              onClick={()=>setMode('type')}>⌨️ 글자로 쓰기</button>
          </div>
          <button className="btn bg-slate-300 text-slate-600 px-8 py-3 t-mid"
            onClick={()=>onComplete({text:'',b64:'',helpUsed,sticker:'',skipped:true})}>건너뛰기 →</button>
          {/* 활동 안내: 버튼 바로 아래 */}
          <div className="t-sm text-slate-500 mt-1">🎤 또는 ⌨️ 를 골라 내 생각을 남겨봐요</div>
        </div>
      )}

      {/* 녹음 중 */}
      {mode==='rec' && (
        <div className="flex flex-col items-center gap-4">
          <button onClick={stopRec}
            className="w-40 h-40 rounded-full bg-rose-400 flex items-center justify-center text-7xl"
            style={{animation:'floaty 1s ease-in-out infinite'}}>⏹</button>
          <div className="t-big text-rose-500">녹음 중! 다 말하면 ⏹ 를 눌러요</div>
          <div className="t-mid text-slate-500 min-h-[40px] px-6">{text||'…'}</div>
        </div>
      )}

      {/* 키보드 입력 */}
      {mode==='type' && (
        <div className="flex flex-col items-center gap-4">
          <textarea value={text} onChange={e=>setText(e.target.value)}
            placeholder="여기에 내 생각을 써 봐요"
            className="w-full h-36 p-5 t-mid rounded-3xl border-4 border-indigo-200 outline-none focus:border-indigo-400"/>
          <button className="btn bg-indigo-500 text-white px-10 py-4 t-big"
            onClick={()=>setMode('done')} disabled={!text.trim()}>다 썼어요 ✓</button>
        </div>
      )}

      {/* 완료 - 듣고 자기평가 */}
      {mode==='done' && (
        <div className="flex flex-col items-center gap-5">
          <div className="w-28 h-28 rounded-full bg-emerald-400 flex items-center justify-center text-6xl pop">✅</div>
          {text && (
            <div className="card p-4 w-full t-mid text-slate-600 bg-white/70">
              "{text}"
            </div>
          )}
          <div className="flex gap-3 flex-wrap justify-center">
            {audioUrl && <button className="btn bg-violet-400 text-white px-7 py-3 t-mid"
              onClick={()=>{ const a=new Audio(audioUrl); a.play(); }}>▶ 내 녹음 듣기</button>}
            {text && <button className="btn bg-sky-400 text-white px-7 py-3 t-mid"
              onClick={()=>speak(text)}>🔊 완성 문장 듣기</button>}
            <button className="btn bg-amber-300 text-amber-900 px-7 py-3 t-mid"
              onClick={reset}>🔁 다시 하기</button>
          </div>
          <StickerPick value={sticker} onPick={setSticker}/>
          <button className="btn bg-indigo-600 text-white px-12 py-5 t-big"
            disabled={!sticker}
            onClick={()=>{ confetti(); fx.yay();
              onComplete({text,b64,helpUsed,sticker,skipped:false}); }}>
            {sticker?'다음으로 →':'스티커를 골라요'}
          </button>
        </div>
      )}

      {/* 도움받기 버튼 (항상) */}
      {mode!=='done' && (
        <div className="mt-6">
          <button className="btn bg-yellow-300 text-yellow-900 px-7 py-3 t-mid"
            onClick={()=>{ setShowHelp(true); setHelpUsed(true); }}>
            💡 도움받기 (예시 문장 보기)
          </button>
        </div>
      )}

      {showHelp && (
        <div className="modal-bg" onClick={()=>setShowHelp(false)}>
          <div className="card p-8 w-[640px]" onClick={e=>e.stopPropagation()}>
            <div className="t-big text-indigo-700 mb-4">💡 이렇게 말해볼 수 있어요</div>
            <div className="flex flex-col gap-3 mb-5">
              {examples.map((ex,i)=><div key={i} className="bg-yellow-50 rounded-2xl p-3"><SpeakText text={ex}/></div>)}
            </div>
            <button className="btn bg-indigo-500 text-white px-8 py-3 t-mid w-full"
              onClick={()=>setShowHelp(false)}>알겠어요! 👍</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* =====================================================
   메인 앱

function App(){
  const [scale,setScale]=useState(1);
  const [view,setView]=useState('login');   // login prerecord situation stage reflection postrecord eval finish
  const [students,setStudents]=useState([]);
  const [student,setStudent]=useState(null);
  const [questions,setQuestions]=useState([]);
  const [speakerOn,setSpeakerOn]=useState(false);
  const [micGranted,setMicGranted]=useState(false);

  const [situation,setSituation]=useState(null);
  const [stage,setStage]=useState(1);
  const COLS=8;
  const [grid,setGrid]=useState(()=>[Array(COLS).fill(null),Array(COLS).fill(null),Array(COLS).fill(null)]);
  const [selectedInst,setSelectedInst]=useState('drum');
  const [bpm,setBpm]=useState(100);
  const [isPlaying,setIsPlaying]=useState(false);
  const [step,setStep]=useState(-1);
  const [isMusicRec,setIsMusicRec]=useState(false);
  const [musicSaved,setMusicSaved]=useState(false);
  const [showGuide,setShowGuide]=useState(false);
  const [feedback,setFeedback]=useState('');

  const [reflection,setReflection]=useState([]);
  const [session,setSession]=useState({});

  const synths=useRef({}), loop=useRef(null), gridRef=useRef(grid), recorder=useRef(null);

  /* 화면 맞춤 scale */
  useEffect(()=>{
    const fit=()=>{
      const s=Math.min(window.innerWidth/1280, window.innerHeight/800);
      setScale(s);
      const stg=document.getElementById('stage');
      stg.style.transform=`scale(${s})`;
      stg.style.left=`${(window.innerWidth-1280*s)/2}px`;
      stg.style.top=`${(window.innerHeight-800*s)/2}px`;
    };
    fit(); window.addEventListener('resize',fit);
    return ()=>window.removeEventListener('resize',fit);
  },[]);

  useEffect(()=>{ speakerRef.current=speakerOn; },[speakerOn]);
  useEffect(()=>{ gridRef.current=grid; },[grid]);
  useEffect(()=>{ Tone.Transport.bpm.value=bpm; },[bpm]);

  /* 초기화 */
  useEffect(()=>{
    api.getStudents().then(r=>{ if(r.ok&&r.students) setStudents(r.students); });
    api.getQuestions().then(r=>{ if(r.ok&&r.questions) setQuestions(r.questions); });

    synths.current={
      drum:new Tone.MembraneSynth({pitchDecay:0.05,octaves:4,envelope:{attack:0.001,decay:0.3,sustain:0.01}}).toDestination(),
      triangle:new Tone.FMSynth({harmonicity:1.5,modulationIndex:12,oscillator:{type:'sine'},envelope:{attack:0.001,decay:0.8,sustain:0,release:0.8}}).toDestination(),
      tambourine:new Tone.MetalSynth({frequency:200,envelope:{attack:0.001,decay:0.1,release:0.01},harmonicity:5.1,modulationIndex:32,resonance:4000,octaves:1.5}).toDestination(),
      castanets:new Tone.MembraneSynth({pitchDecay:0.001,octaves:0.1,envelope:{attack:0.001,decay:0.05,sustain:0}}).toDestination(),
    };
    recorder.current=new Tone.Recorder();
    Tone.getDestination().connect(recorder.current);

    loop.current=new Tone.Sequence((time,col)=>{
      Tone.Draw.schedule(()=>setStep(col),time);
      let cnt=0;
      gridRef.current.forEach(row=>{
        const id=row[col];
        if(id){ cnt++; const sy=synths.current[id];
          if(id==='triangle') sy.triggerAttackRelease('C8','16n',time);
          else if(id==='tambourine') sy.triggerAttackRelease('16n',time);
          else if(id==='castanets') sy.triggerAttackRelease('C5','32n',time);
          else sy.triggerAttackRelease('C2','8n',time);
        }
      });
      Tone.Draw.schedule(()=>{
        if(cnt>1) setFeedback('✨ 여러 악기가 함께! 소리가 풍부해져요!');
        else if(cnt===1) setFeedback('🎶 멋진 소리가 나고 있어요!');
      },time);
    },[0,1,2,3,4,5,6,7],'8n');

    return ()=>{
      Object.values(synths.current).forEach(s=>s&&s.dispose());
      if(loop.current) loop.current.dispose();
    };
  },[]);

  /* 단계 들어올 때 안내 */
  useEffect(()=>{
    if(view==='stage'){
      setShowGuide(true);
      setTimeout(()=>speak(STAGE_INFO[stage].guide.replace(/\n/g,' ')),400);
    }
  },[view,stage]);

  const trigger=async(id)=>{
    await Tone.start();
    const sy=synths.current[id];
    if(id==='triangle') sy.triggerAttackRelease('C8','16n');
    else if(id==='tambourine') sy.triggerAttackRelease('16n');
    else if(id==='castanets') sy.triggerAttackRelease('C5','32n');
    else sy.triggerAttackRelease('C2','8n');
  };

  const handleCell=async(r,c)=>{
    await Tone.start();
    const ng=grid.map(row=>[...row]);
    if(stage===1){
      if(r!==0) return;
      if(ng[0][c]){ ng[0][c]=null; }
      else { ng[0][c]='drum'; trigger('drum'); }
    } else if(stage===2){
      if(r!==0) return;
      if(ng[0][c]){ ng[0][c]=null; }
      else { ng[0][c]=selectedInst; trigger(selectedInst); }
    } else {
      if(ng[r][c]===selectedInst){ ng[r][c]=null; }
      else { ng[r][c]=selectedInst; trigger(selectedInst); }
    }
    setGrid(ng);
  };

  /* 2단계: 악기 통째 교체 (변인통제) */
  const swapAllInstrument=(id)=>{
    setSelectedInst(id); trigger(id);
    setGrid(g=>{
      const ng=g.map(row=>[...row]);
      ng[0]=ng[0].map(c=>c?id:null);
      return ng;
    });
    setFeedback(`${INSTRUMENTS.find(i=>i.id===id).name}(으)로 바꿨어요! 느낌이 어떤가요?`);
  };

  const play=async()=>{
    await Tone.start();
    if(!isPlaying){ Tone.Transport.start(); loop.current.start(0); setIsPlaying(true);
      setFeedback('전체 음악을 연주해요!'); speak('전체 음악을 연주해요'); }
    else { Tone.Transport.stop(); loop.current.stop(); setIsPlaying(false); setStep(-1);
      setFeedback('멈췄어요. 빈 칸을 눌러 바꿔봐요.'); speak('연주를 멈췄어요'); }
  };

  const musicRec=async()=>{
    await Tone.start();
    if(!isMusicRec){
      recorder.current.start(); setIsMusicRec(true);
      if(!isPlaying) play();
      setFeedback('🔴 내가 만든 음악을 녹음 중!'); speak('음악 녹음을 시작해요');
    } else {
      setIsMusicRec(false);
      const rec=await recorder.current.stop();
      const reader=new FileReader();
      reader.onloadend=async()=>{
        const b64=reader.result.split(',')[1];
        const res=await api.saveRecording({studentName:student.name,phase:'music',audioBase64:b64,mimeType:'audio/webm'});
        if(res.ok) setSession(p=>({...p,musicUrl:res.fileUrl}));
      };
      reader.readAsDataURL(rec);
      setMusicSaved(true); confetti(); fx.yay();
      setFeedback('✅ 음악이 저장되었어요!'); speak('음악이 저장되었어요');
    }
  };

  const goStage=(n)=>{
    Tone.Transport.stop(); loop.current.stop(); setIsPlaying(false); setStep(-1);
    setGrid(g=>{
      const ng=[Array(COLS).fill(null),Array(COLS).fill(null),Array(COLS).fill(null)];
      if(n===2){ ng[0]=[...g[0]]; }      // 1단계 패턴 유지
      else if(n===3){ ng[0]=[...g[0]]; } // 시작점으로 유지
      return ng;
    });
    if(n===1) setSelectedInst('drum');
    if(n===2) setSelectedInst(grid[0].find(x=>x)||'drum');
    if(n===3) setSelectedInst('tambourine');
    setStage(n); setView('stage');
    setFeedback(STAGE_INFO[n].short);
  };

  const FAIRY=({size=80})=>(
    <div className="float" style={{fontSize:size}}>🎵</div>
  );

  /* ============ 렌더 ============ */
  return (
    <div style={{width:1280,height:800,position:'relative',padding:24}}>

      {/* 스피커 토글 - 항상 우상단 */}
      {view!=='login' && (
        <button onClick={()=>{ const n=!speakerOn; setSpeakerOn(n); }}
          className={"btn absolute top-6 right-6 px-6 py-3 t-mid z-50 "+
            (speakerOn?'bg-emerald-400 text-white':'bg-slate-300 text-slate-600')}>
          {speakerOn?'🔊 소리 켜짐':'🔇 소리 꺼짐'}
        </button>
      )}

      {/* ---- 로그인 ---- */}
      {view==='login' && (
        <div className="h-full flex flex-col items-center justify-center gap-7 fade-in">
          <FAIRY size={110}/>
          <h1 className="t-title text-indigo-600">🎵 소리 탐험대 🎵</h1>
          <p className="t-big text-slate-500">어떤 소리가 들릴지 탐색하고 연주해봐요!</p>
          <div className="card p-10 w-[560px] flex flex-col gap-6">
            <select className="w-full p-5 t-big text-center rounded-3xl bg-indigo-50 border-4 border-indigo-200 outline-none focus:border-indigo-400"
              defaultValue="" onChange={e=>setStudent(students.find(s=>String(s.no)===e.target.value))}>
              <option value="" disabled>이름을 선택하세요</option>
              {students.map(s=><option key={s.no} value={s.no}>{s.name}</option>)}
            </select>
            <button className="btn bg-indigo-500 text-white t-huge px-12 py-6"
              onClick={async()=>{
                if(!student){ alert('이름을 선택하세요!'); return; }
                await Tone.start();
                try{
                  const st=await navigator.mediaDevices.getUserMedia({audio:true});
                  st.getTracks().forEach(t=>t.stop());
                  setMicGranted(true);
                }catch(e){
                  setMicGranted(false);
                  alert('마이크 없이도 괜찮아요! 글자로 입력할 수 있어요.');
                }
                setView('prerecord');
              }}>출발! 🚀</button>
          </div>
        </div>
      )}

      {/* ---- 사전 녹음 ---- */}
      {view==='prerecord' && (
        <div className="h-full flex flex-col items-center justify-center gap-6 fade-in">
          <FAIRY/>
          <RecorderUI
            title="주변에서 어떤 소리가 들리나요?"
            phase="pre" micGranted={micGranted}
            examples={['교실에서 친구들 목소리가 들려요.','창밖에서 새가 지저귀어요.','시계가 째깍째깍 소리를 내요.','바람이 솔솔 부는 소리가 들려요.']}
            onComplete={async(r)=>{
              setSession(p=>({...p,preRecordText:r.text,preHelp:r.helpUsed,preSticker:r.sticker}));
              if(r.b64){
                const res=await api.saveRecording({studentName:student.name,phase:'pre',audioBase64:r.b64,mimeType:'audio/webm'});
                if(res.ok) setSession(p=>({...p,preRecordUrl:res.fileUrl}));
              }
              setView('situation');
            }}/>
        </div>
      )}

      {/* ---- 상황 선택 ---- */}
      {view==='situation' && (
        <div className="h-full flex flex-col items-center justify-center gap-6 fade-in">
          <h2 className="t-huge text-indigo-700">어떤 장면의 음악을 만들어볼까요?</h2>
          <p className="t-mid text-slate-500">장면을 고르면 어울리는 빠르기로 시작해요</p>
          <div className="flex gap-7">
            {SITUATIONS.map(s=>(
              <button key={s.id}
                onClick={()=>{ setSituation(s); setBpm(s.bpm); trigger('drum'); }}
                className={"card p-7 w-[330px] flex flex-col items-center gap-3 transition-transform "+
                  (situation&&situation.id===s.id?'scale-105 ring-8 ring-indigo-300':'hover:scale-102')}>
                <div className="text-8xl">{s.emoji}</div>
                <div className="t-big text-indigo-700">{s.name}</div>
                <div className="t-mid text-slate-500">{s.desc}</div>
              </button>
            ))}
          </div>
          {situation && (
            <div className="card px-8 py-4 t-mid text-indigo-600 fade-in">
              {situation.emoji} {situation.hint}
            </div>
          )}
          <button className="btn bg-indigo-600 text-white t-big px-12 py-5"
            disabled={!situation}
            onClick={()=>goStage(1)}>{situation?'음악 만들러 가기 →':'장면을 골라요'}</button>
        </div>
      )}

      {/* ---- 단계 (음악 만들기) ---- */}
      {view==='stage' && (
        <div className="h-full flex flex-col fade-in">
          {/* 헤더 */}
          <div className="flex items-center justify-between mb-3 pr-44">
            <div className="flex items-center gap-3">
              <FAIRY size={56}/>
              <div className="card px-6 py-3"><span className="t-mid text-indigo-700">{feedback||STAGE_INFO[stage].short}</span></div>
            </div>
            <div className="flex items-center gap-3">
              <button className="btn bg-amber-300 text-amber-900 px-5 py-3 t-mid"
                onClick={()=>{ setShowGuide(true); speak(STAGE_INFO[stage].guide.replace(/\n/g,' ')); }}>💡 도움말</button>
              <div className="card px-5 py-2 flex items-center gap-2">
                <span className="text-3xl">🐢</span>
                <input type="range" min="50" max="150" value={bpm} onChange={e=>setBpm(Number(e.target.value))}/>
                <span className="text-3xl">🐰</span>
              </div>
            </div>
          </div>

          {/* 상황 배너 */}
          {situation && (
            <div className="card px-6 py-2 mb-3 self-center t-mid text-indigo-600">
              지금 만드는 장면 : {situation.emoji} {situation.name}
            </div>
          )}

          <div className="t-big text-center text-indigo-700 mb-2">{STAGE_INFO[stage].title}</div>

          {/* 본문 */}
          <div className="flex-1 flex items-center justify-center gap-6">
            {/* 악기 패널 */}
            <div className="card p-3 flex flex-col gap-2">
              {INSTRUMENTS.filter(i=>stage===1?i.id==='drum':true).map(inst=>(
                <div key={inst.id}
                  onClick={()=>{
                    if(stage===2){ swapAllInstrument(inst.id); }
                    else { setSelectedInst(inst.id); trigger(inst.id); speak(inst.name);
                      setFeedback(`${inst.name} 선택! 빈 칸을 눌러요.`); }
                  }}
                  className={"inst-card w-[136px] p-2 "+(selectedInst===inst.id?'sel':'')}
                  style={{background:selectedInst===inst.id?inst.color:'rgba(255,255,255,0.7)'}}>
                  <InstIcon type={inst.id} size={52}/>
                  <span className="t-sm mt-1 text-slate-700">{inst.name}</span>
                </div>
              ))}
            </div>

            {/* 그리드 */}
            <div className="card p-6 flex-1 max-w-[900px]">
              {/* 박자 라벨 - 쿵쿵쿵쿵 크게 */}
              <div className="flex justify-around mb-4 px-1">
                {Array(COLS).fill('쿵').map((l,i)=>(
                  <span key={i} className={"t-big transition-all "+(step===i?'text-indigo-700 scale-150':'text-indigo-300')}>{l}</span>
                ))}
              </div>
              <div className="flex flex-col gap-3">
                {grid.map((row,r)=>{
                  if(stage!==3 && r>0) return null;
                  return (
                    <div key={r} className="flex gap-3 justify-center">
                      {row.map((cell,c)=>{
                        const inst=cell?INSTRUMENTS.find(i=>i.id===cell):null;
                        const sz=stage===3?76:90;
                        return (
                          <div key={c} onClick={()=>handleCell(r,c)}
                            className={"beat-cell "+(step===c?'now ':'')+(inst?'filled':'')}
                            style={{width:sz,height:sz, background:inst?inst.color:undefined}}>
                            {inst && <InstIcon type={inst.id} size={sz*0.66}/>}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* 하단 버튼 + 안내 (버튼 근처) */}
          <div className="flex items-end justify-center gap-6 mt-3 pb-2">
            <div className="w-[260px] text-center">
              <div className="t-mid text-slate-500">{STAGE_INFO[stage].short}</div>
            </div>
            <div className="flex flex-col items-center">
              <button onClick={play}
                className={"btn t-huge px-14 py-6 text-white "+(isPlaying?'bg-rose-400':'bg-indigo-500')}>
                {isPlaying?'멈춤 ⏹':'연주 ▶'}
              </button>
              <div className="t-sm text-slate-400 mt-1">눌러서 전체 음악 듣기</div>
            </div>
            <div className="w-[260px] flex flex-col items-center gap-2">
              {stage===1 && <button className="btn bg-emerald-400 text-white t-big px-8 py-4"
                onClick={()=>goStage(2)}>2단계 가기 →</button>}
              {stage===2 && <button className="btn bg-emerald-400 text-white t-big px-8 py-4"
                onClick={()=>goStage(3)}>3단계 가기 →</button>}
              {stage===3 && (<>
                <button onClick={musicRec}
                  className={"btn t-big px-8 py-4 text-white "+(isMusicRec?'bg-red-500':'bg-pink-500')}>
                  {isMusicRec?'녹음 끝 ⏹':'🎵 음악 녹음'}
                </button>
                {musicSaved && <button className="btn bg-violet-500 text-white t-big px-8 py-4 float"
                  onClick={()=>{ Tone.Transport.stop(); loop.current.stop(); setIsPlaying(false); setView('reflection'); }}>
                  🎤 다음으로 →</button>}
              </>)}
            </div>
          </div>
        </div>
      )}

      {/* ---- 배움 정리 / 성찰 ---- */}
      {view==='reflection' && (
        <div className="h-full flex flex-col items-center justify-center gap-6 fade-in">
          <FAIRY/>
          <h2 className="t-huge text-indigo-700">오늘 알게 된 것을 골라봐요</h2>
          <p className="t-mid text-slate-500">맞다고 생각하는 것을 모두 눌러요 (여러 개 가능)</p>
          <div className="flex flex-col gap-4 w-[720px]">
            {[
              '악기마다 소리와 느낌이 달라요',
              '여러 악기를 함께 연주하면 소리가 풍부해져요',
              '빠르기에 따라 장면의 느낌이 달라져요',
              '빈 칸을 채우는 방법으로 박을 만들 수 있어요',
            ].map(item=>(
              <button key={item} onClick={()=>{
                  setReflection(p=>p.includes(item)?p.filter(x=>x!==item):[...p,item]);
                }}
                className={"card p-5 t-mid text-left transition-transform "+
                  (reflection.includes(item)?'ring-8 ring-emerald-300 bg-emerald-50 scale-102':'hover:scale-101')}>
                {reflection.includes(item)?'✅ ':'⬜ '}{item}
              </button>
            ))}
          </div>
          <button className="btn bg-indigo-600 text-white t-big px-12 py-5"
            disabled={reflection.length===0}
            onClick={()=>setView('postrecord')}>
            {reflection.length?'발표하러 가기 →':'하나 이상 골라요'}</button>
        </div>
      )}

      {/* ---- 사후 녹음 (발표) ---- */}
      {view==='postrecord' && (
        <div className="h-full flex flex-col items-center justify-center gap-6 fade-in">
          <FAIRY/>
          <RecorderUI
            title={`'${situation?situation.name:''}'에 맞게 어떻게 만들었나요?`}
            phase="post" micGranted={micGranted}
            examples={[
              '달팽이처럼 천천히 칸을 띄엄띄엄 채웠어요.',
              '친구가 뛰는 것처럼 빠르게 만들었어요.',
              '작은 북으로 쿵쿵 소리를 내봤어요.',
              '여러 악기를 섞어서 풍부한 소리를 만들었어요.',
            ]}
            onComplete={async(r)=>{
              setSession(p=>({...p,postRecordText:r.text,postHelp:r.helpUsed,postSticker:r.sticker}));
              if(r.b64){
                const res=await api.saveRecording({studentName:student.name,phase:'post',audioBase64:r.b64,mimeType:'audio/webm'});
                if(res.ok) setSession(p=>({...p,postRecordUrl:res.fileUrl}));
              }
              setView('eval');
            }}/>
        </div>
      )}

      {/* ---- 자기평가 (녹음 이후) ---- */}
      {view==='eval' && (
        <div className="h-full flex flex-col items-center justify-center fade-in">
          <div className="card p-12 w-[680px] text-center flex flex-col gap-5">
            <h2 className="t-huge text-indigo-700">별표로 내 다짐을 평가해볼까요?</h2>
            <p className="t-mid text-slate-500">오늘 활동에 얼마나 열심히 도전했나요?</p>
            <div className="flex justify-center gap-2">
              {[1,2,3,4,5].map(i=>(
                <span key={i} onClick={()=>setSession(p=>({...p,selfScore:i}))}
                  className={"text-7xl cursor-pointer transition-transform "+
                    (session.selfScore>=i?'text-yellow-400 scale-110':'text-slate-300')}>★</span>
              ))}
            </div>
            {session.selfScore>0 && session.selfScore<=3 && (
              <p className="t-big text-pink-500 float">조금 더 도전하면 멋질 거예요! 다시 해볼까요?</p>
            )}
            {session.selfScore>3 && (
              <p className="t-big text-emerald-500">끝까지 해낸 끈기가 정말 멋져요! 🌟</p>
            )}
            <div className="flex flex-col gap-3 mt-2">
              {session.selfScore>0 && session.selfScore<=3 && (
                <button className="btn bg-pink-500 text-white t-big px-10 py-5"
                  onClick={()=>{ setMusicSaved(false); goStage(1); }}>
                  🔁 1단계부터 다시 하기
                </button>
              )}
              {session.selfScore>3 && (<>
                <button className="btn bg-indigo-600 text-white t-big px-10 py-5"
                  onClick={async()=>{
                    const data={
                      studentName:student.name,
                      situation:situation?situation.name:'',
                      preRecordText:session.preRecordText||'', preRecordUrl:session.preRecordUrl||'',
                      preHelp:session.preHelp, preSticker:session.preSticker||'',
                      stage1Pattern:grid[0].map(c=>c?'■':'·').join(''),
                      stage2Instrument:selectedInst,
                      stage3Pattern:grid.map(r=>r.map(c=>c?'■':'·').join('')).join(' / '),
                      musicUrl:session.musicUrl||'',
                      reflectionItems:reflection.join(', '),
                      postRecordText:session.postRecordText||'', postRecordUrl:session.postRecordUrl||'',
                      postHelp:session.postHelp, postSticker:session.postSticker||'',
                      selfScore:session.selfScore, certified:true
                    };
                    await api.saveData(data);
                    confetti(); fx.yay();
                    setView('finish');
                  }}>
                  🏅 수료증 받기!
                </button>
                <button className="btn bg-slate-300 text-slate-600 t-mid px-8 py-3"
                  onClick={()=>{ setMusicSaved(false); goStage(1); }}>
                  그래도 다시 해보고 싶어요
                </button>
              </>)}
            </div>
          </div>
        </div>
      )}

      {/* ---- 수료증 ---- */}
      {view==='finish' && (
        <div className="h-full flex flex-col items-center justify-center gap-5 fade-in">
          <div className="bg-white w-[920px] rounded-[40px] border-[14px] border-indigo-200 shadow-2xl overflow-hidden">
            {/* 섹션1: 머리말 */}
            <div className="bg-indigo-500 text-white py-5 text-center">
              <div className="t-mid tracking-widest">제 2026 - 001 호</div>
              <div className="t-title">🏅 소리 탐험 수료증</div>
            </div>
            {/* 섹션2: 받는 사람 */}
            <div className="py-6 text-center border-b-4 border-dashed border-indigo-100">
              <div className="t-mid text-slate-400">탐험가</div>
              <div className="t-huge text-indigo-700">{student?student.name:''}</div>
            </div>
            {/* 섹션3: 본문 */}
            <div className="py-7 px-12 text-center">
              <p className="t-big text-slate-700 leading-relaxed">
                위 탐험가는 <span className="text-pink-500">'소리 탐험대'</span> 활동을 통해<br/>
                다양한 악기 소리를 탐색하고<br/>
                장면에 어울리는 <span className="text-indigo-600">나만의 음악</span>을<br/>
                끝까지 멋지게 완성하였기에 이 증서를 드립니다.
              </p>
            </div>
            {/* 섹션4: 성취기준 + 날짜 */}
            <div className="bg-indigo-50 py-5 px-12 flex items-center justify-between border-t-4 border-indigo-100">
              <div className="t-sm text-slate-500 text-left">
                관련 성취기준<br/>
                <span className="t-mid text-indigo-600">[2즐02-04] 우리의 생각이나 느낌을 다양하게 표현한다.</span>
              </div>
              <div className="text-right">
                <div className="t-mid text-slate-500">{new Date().toLocaleDateString('ko-KR')}</div>
                <div className="text-6xl">🎖️</div>
              </div>
            </div>
          </div>
          <button className="btn bg-indigo-600 text-white t-big px-12 py-5"
            onClick={()=>window.location.reload()}>처음으로 돌아가기</button>
        </div>
      )}

      {/* ---- 활동 안내 팝업 ---- */}
      {showGuide && view==='stage' && (
        <div className="modal-bg" onClick={()=>setShowGuide(false)}>
          <div className="card p-10 w-[640px] text-center" onClick={e=>e.stopPropagation()}>
            <div className="t-huge text-indigo-700 mb-4">💡 {STAGE_INFO[stage].title}</div>
            <p className="t-big text-slate-600 mb-7" style={{whiteSpace:'pre-line'}}>{STAGE_INFO[stage].guide}</p>
            <button className="btn bg-indigo-500 text-white t-big px-10 py-4"
              onClick={()=>setShowGuide(false)}>알겠어요! 👍</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
