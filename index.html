/* ===== 스피커 OFF면 모든 소리 차단 ===== */
let SPK = false;
const setSPK = (v) => { SPK = v; if (!v) window.speechSynthesis?.cancel(); };
const beep = (freq=800, dur=0.12, type="sine", vol=0.15) => {
  if (!SPK) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = type; o.frequency.value = freq; g.gain.value = vol;
    o.connect(g); g.connect(ctx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.stop(ctx.currentTime + dur);
  } catch(e){}
};
const happySound = () => { beep(660,0.1); setTimeout(()=>beep(880,0.12),120); setTimeout(()=>beep(1100,0.16),250); };
const sadSound   = () => { beep(330,0.15,"triangle"); setTimeout(()=>beep(220,0.2,"triangle"),160); };
const popSound   = () => beep(1000,0.08,"square",0.1);
const pickKoreanVoice = () => {
  const all = window.speechSynthesis?.getVoices() || [];
  const kor = all.filter(v => /ko/i.test(v.lang));
  return kor.find(v => /Google/i.test(v.name)) || kor.find(v => /Wavenet|Neural/i.test(v.name)) || kor[0];
};
const speak = (text, opts={}) => {
  if (!SPK) return;
  try {
    window.speechSynthesis?.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ko-KR"; u.rate = opts.rate ?? 0.95; u.pitch = opts.pitch ?? 1.05; u.volume = 1.0;
    const v = pickKoreanVoice(); if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  } catch(e){}
};
const saveToGAS = (action, payload) => {
  if (!GAS_URL) return Promise.resolve({ok:false});
  return fetch(GAS_URL, { method:"POST", body: JSON.stringify({ action, payload }), headers:{"Content-Type":"text/plain;charset=utf-8"} })
    .then(r=>r.json()).catch(e=>({ok:false, error:String(e)}));
};

function Burst({ x, y, onDone }) {
  const colors = ["#FF6B9D","#FFD93D","#6BCB77","#54A0FF","#C56CF0","#FF9F43"];
  const particles = Array.from({length: 20}, (_,i)=> {
    const a = (Math.PI * 2 * i) / 20;
    const d = 90 + Math.random()*70;
    return { bx: Math.cos(a)*d, by: Math.sin(a)*d, c: colors[i % colors.length] };
  });
  useEffect(() => { const t = setTimeout(onDone, 1000); return ()=>clearTimeout(t); }, []);
  return (
    <div className="fixed pointer-events-none z-50" style={{ left:x, top:y }}>
      {particles.map((p,i)=>(
        <span key={i} className="burst-particle"
          style={{ "--bx":`${p.bx}px`, "--by":`${p.by}px`, background:p.c, width:14, height:14, borderRadius:"50%", display:"block" }} />
      ))}
    </div>
  );
}

function RecordBlock({ prompt, helpText, onSubmit, askStars=false }) {
  const [recording, setRecording] = useState(false);
  const [audioURL, setAudioURL] = useState(null);
  const [stt, setStt] = useState("");
  const [textInput, setTextInput] = useState("");
  const [stars, setStars] = useState(0);
  const [stickerPicked, setStickerPicked] = useState(null);
  const recRef = useRef(null);
  const chunksRef = useRef([]);
  const recogRef = useRef(null);

  useEffect(()=>{ speak(prompt); },[prompt]);

  const startRec = async () => {
    setStt(""); setAudioURL(null); chunksRef.current = [];
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const mr = new MediaRecorder(stream);
      recRef.current = mr;
      mr.ondataavailable = e => chunksRef.current.push(e.data);
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, {type:"audio/webm"});
        setAudioURL(URL.createObjectURL(blob));
        stream.getTracks().forEach(t=>t.stop());
      };
      mr.start(); setRecording(true);
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SR) {
        const r = new SR();
        r.lang = "ko-KR"; r.continuous = true; r.interimResults = true;
        r.onresult = (ev) => {
          let s = "";
          for (let i=ev.resultIndex; i<ev.results.length; i++) s += ev.results[i][0].transcript;
          setStt(s);
        };
        r.start(); recogRef.current = r;
      }
    } catch(e) { alert("마이크를 사용할 수 없어요. 글로 적어 주세요."); }
  };
  const stopRec = () => { recRef.current?.stop(); recogRef.current?.stop(); setRecording(false); };

  const finalText = (stt || textInput).trim();
  const needRetry = askStars && stars >= 1 && stars <= 3;
  const canSubmit = askStars ? (stars > 0 && (stars <= 3 || stickerPicked)) : (finalText.length > 0 || audioURL);

  const handleSubmit = () => {
    if (needRetry) { setStars(0); setAudioURL(null); setStt(""); setTextInput(""); return; }
    onSubmit({ text: finalText, audioURL, stars, sticker: stickerPicked });
  };

  return (
    <div className="absolute inset-0 pt-14 px-4 pb-3"
      style={{display:'grid', gridTemplateRows: askStars ? 'auto 1.2fr 1fr auto' : 'auto 1fr auto', gap:'0.6rem'}}>
      <FloatingDeco/>
      {/* 헤더 */}
      <div className="text-center">
        <h2 className="font-cafe24 t-2xl">
          🎤 <span className="hi-blue">{prompt}</span>
        </h2>
        {helpText && <p className="font-cafe24 t-base text-gray-600">{helpText}</p>}
      </div>

      {/* 녹음 영역 - 화면 꽉 채움 */}
      <div className="bg-white/90 rounded-3xl shadow-xl p-4 flex flex-col items-center justify-center gap-3 min-h-0 max-w-4xl w-full mx-auto">
        <div className="flex items-center justify-center">
          {!recording ? (
            <button onClick={startRec}
              style={{width:"clamp(6rem,16vmin,11rem)", height:"clamp(6rem,16vmin,11rem)"}}
              className="rounded-full bg-gradient-to-br from-pink-400 to-rose-500 text-white shadow-2xl flex items-center justify-center card-hover pulse-grow">
              <Mic style={{width:"40%", height:"40%"}}/>
            </button>
          ) : (
            <button onClick={stopRec}
              style={{width:"clamp(6rem,16vmin,11rem)", height:"clamp(6rem,16vmin,11rem)"}}
              className="rounded-full bg-rose-500 text-white shadow-2xl flex items-center justify-center recording-pulse">
              <Square style={{width:"35%", height:"35%"}}/>
            </button>
          )}
        </div>
        <p className="text-center font-cafe24 t-md text-gray-500">
          {recording ? "🎙️ 듣고 있어요…" : audioURL ? "✅ 녹음 완료!" : "마이크를 눌러서 말해 봐요"}
        </p>
        {(stt || textInput || audioURL) && (
          <div className="w-full">
            <div className="font-cafe24 t-sm text-gray-500 mb-1">📝 내가 말한 내용</div>
            <textarea value={stt || textInput} onChange={e=>setTextInput(e.target.value)} rows={2}
              placeholder="여기에 직접 적어도 돼요!"
              className="w-full p-2 rounded-2xl border-4 border-yellow-100 font-cafe24 t-base resize-none"/>
          </div>
        )}
        {audioURL && (
          <div className="w-full flex gap-2">
            <audio src={audioURL} controls className="w-full"/>
            <button onClick={()=>{ setAudioURL(null); setStt(""); }} className="p-2 bg-gray-100 rounded-2xl card-hover">
              <Trash2 size={20}/>
            </button>
          </div>
        )}
      </div>

      {/* 별점 + 스티커 (사후만) */}
      {askStars && (
        <div className="bg-white/90 rounded-3xl shadow-xl p-4 flex flex-col justify-center min-h-0 max-w-4xl w-full mx-auto">
          <p className="font-cafe24 t-md text-center text-gray-700 mb-2 flex-none">내 녹음을 들어보고 ⭐ 점수를 줘요</p>
          <div className="flex justify-center gap-2 flex-none">
            {[1,2,3,4,5].map(n=>(
              <button key={n} onClick={()=>{ setStars(n); popSound(); }} className="star-btn">
                <Star size={48} fill={n<=stars?"#FBBF24":"none"} stroke={n<=stars?"#F59E0B":"#D1D5DB"} strokeWidth={2}/>
              </button>
            ))}
          </div>
          {stars > 0 && stars <= 3 && (
            <p className="text-center mt-2 font-cafe24 t-base text-rose-500 flex-none">💪 한 번 더 녹음해 볼까요?</p>
          )}
          {stars >= 4 && (
            <div className="mt-2 flex-1 flex flex-col justify-center min-h-0">
              <p className="text-center font-cafe24 t-base text-emerald-600 mb-2 flex-none">와! 정말 잘했어요. 스티커를 골라 주세요! 🎁</p>
              <div className="flex justify-center flex-wrap gap-2">
                {STICKERS.map(s=>(
                  <button key={s} onClick={()=>{ setStickerPicked(s); popSound(); }}
                    className={`t-2xl p-1 rounded-2xl card-hover ${stickerPicked===s?"bg-yellow-200 scale-110":"bg-white"}`}>
                    {s}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* 버튼 - 고정 */}
      <div className="flex justify-center">
        <button onClick={handleSubmit} disabled={!canSubmit}
          className="px-7 py-3 rounded-2xl bg-gradient-to-r from-emerald-400 to-green-500 text-white font-cafe24 t-lg shadow-lg card-hover disabled:opacity-40 disabled:cursor-not-allowed">
          {needRetry ? "다시 녹음하기 🔄" : "다음으로 🚀"}
        </button>
      </div>
    </div>
  );
}

      </div>

      {/* 카드 영역 - 화면 비율 50% 차지 */}
      <div className="flex flex-wrap items-center justify-center gap-3 min-h-0">
        <AnimatePresence>
          {remaining.map((card, idx)=>(
            <motion.div key={card.id}
              drag dragSnapToOrigin dragElastic={1}
              whileDrag={{ scale: 1.18, zIndex: 50, rotate: 4 }}
              initial={{scale:0, y:30}} animate={{scale:1, y:0}}
              transition={{delay: idx*0.1, type:"spring", stiffness:200}}
              onDragEnd={(e, info)=>{
                const lb = leftRef.current?.getBoundingClientRect();
                const rb = rightRef.current?.getBoundingClientRect();
                const {x, y} = info.point;
                if (lb && x>=lb.left && x<=lb.right && y>=lb.top && y<=lb.bottom) handleDrop(card, "left", {x, y});
                else if (rb && x>=rb.left && x<=rb.right && y>=rb.top && y<=rb.bottom) handleDrop(card, "right", {x, y});
              }}
              animate={wrongCard === card.id ? { x: [0,-14,14,-14,14,0] } : { x: 0, scale:1, y:0 }}
              transition={wrongCard === card.id ? { duration: 0.4 } : {type:"spring"}}
              exit={{ scale: 0, opacity: 0, rotate: 360 }}
              style={{width:"19%", minWidth:"7rem", maxWidth:"11rem", aspectRatio:"3/4"}}
              className="bg-white rounded-3xl shadow-2xl p-2 text-center cursor-grab select-none active:cursor-grabbing border-4 border-yellow-300 flex flex-col">
              <div className="flex-1 flex items-center justify-center pointer-events-none">
                {SVG[card.art]?.()}
              </div>
              <div className="font-cafe24 t-base text-gray-700 pointer-events-none mt-1">{card.text}</div>
            </motion.div>
          ))}
        </AnimatePresence>
      </div>

      {/* 두 박스 - 화면 비율 50% */}
      <div className="grid grid-cols-2 gap-3 min-h-0">
        <div ref={leftRef}
          style={{background: `linear-gradient(135deg, ${data.leftBox.from}, ${data.leftBox.to})`}}
          className="rounded-3xl p-3 border-4 border-dashed border-white/70 text-white shadow-xl overflow-auto no-scrollbar flex flex-col">
          <div className="text-center font-cafe24 t-lg mb-1 flex-none">{data.leftBox.emoji} {data.leftBox.label}</div>
          <div className="flex flex-wrap justify-center gap-2 flex-1 items-center">
            {data.cards.filter(c=>placed[c.id]==="left").map(c=>(
              <motion.div key={c.id} initial={{scale:0.3, rotate:-15}} animate={{scale:1, rotate:0}}
                style={{width:"24%", minWidth:"4rem", aspectRatio:"3/4"}}
                className="bg-white/95 text-gray-800 rounded-2xl p-1 shadow flex flex-col items-center justify-between">
                <div style={{width:"80%", aspectRatio:"1/1"}}>{SVG[c.art]?.()}</div>
                <div className="font-cafe24 t-xs text-center leading-tight">{c.text}</div>
              </motion.div>
            ))}
          </div>
        </div>
        <div ref={rightRef}
          style={{background: `linear-gradient(135deg, ${data.rightBox.from}, ${data.rightBox.to})`}}
          className="rounded-3xl p-3 border-4 border-dashed border-white/70 text-white shadow-xl overflow-auto no-scrollbar flex flex-col">
          <div className="text-center font-cafe24 t-lg mb-1 flex-none">{data.rightBox.emoji} {data.rightBox.label}</div>
          <div className="flex flex-wrap justify-center gap-2 flex-1 items-center">
            {data.cards.filter(c=>placed[c.id]==="right").map(c=>(
              <motion.div key={c.id} initial={{scale:0.3, rotate:15}} animate={{scale:1, rotate:0}}
                style={{width:"24%", minWidth:"4rem", aspectRatio:"3/4"}}
                className="bg-white/95 text-gray-800 rounded-2xl p-1 shadow flex flex-col items-center justify-between">
                <div style={{width:"80%", aspectRatio:"1/1"}}>{SVG[c.art]?.()}</div>
                <div className="font-cafe24 t-xs text-center leading-tight">{c.text}</div>
              </motion.div>
            ))}
          </div>
        </div>
      </div>

      {/* 하단 */}
      <div className="flex justify-center gap-3">
        {!allDone && Object.keys(placed).length > 0 && (
          <button onClick={()=>setPlaced({})}
            className="px-4 py-2 rounded-2xl bg-gray-100 font-cafe24 t-base card-hover">🔄 처음부터</button>
        )}
        {allDone && (
          <motion.button initial={{scale:0}} animate={{scale:1}}
            onClick={onDone}
            className="px-6 py-3 rounded-2xl bg-gradient-to-r from-emerald-400 to-green-500 text-white font-cafe24 t-lg shadow-lg card-hover pulse-grow">
            퀴즈 풀러 가기 🚀
          </motion.button>
        )}
      </div>
      {bursts.map(b=> <Burst key={b.id} x={b.x} y={b.y} onDone={()=>setBursts(bs=>bs.filter(x=>x.id!==b.id))}/>)}
    </div>
  );
}

/* =========================================================
   퀴즈
========================================================= */
function Quiz({ area, name, onDone, helpUsed, setHelpUsed, addScore }) {
  const pool = useMemo(()=> QUESTIONS.filter(q=>q.area===area), [area]);

  const [idx, setIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);   // 정답 맞췄을 때만 true
  const [wrongPicks, setWrongPicks] = useState([]);  // 틀린 보기 인덱스들
  const [wrongHint, setWrongHint] = useState(false); // 틀렸을 때 힌트 표시
  const [firstTry, setFirstTry] = useState(true);    // 한 번에 맞췄는지
  const [score, setScore] = useState(0);
  const [bursts, setBursts] = useState([]);
  const [showHelp, setShowHelp] = useState(false);
  const q = pool[idx];
  const areaInfo = AREAS.find(a=>a.id === q.area) || AREAS[0];

  // 보기 매번 셔플 (정답 위치 다양화)
  const { opts: shuffledOpts, ansIdx: ans } = useMemo(()=>{
    if (!q) return { opts: [], ansIdx: 0 };
    const idxs = [0, 1, 2];
    for (let i = idxs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
    }
    return { opts: idxs.map(i => q.opts[i]), ansIdx: idxs.indexOf(q.ans) };
  }, [idx, q?.q]);

  useEffect(()=>{ speak(q.q); }, [idx]);

  const choose = (i, evt) => {
    if (revealed || wrongPicks.includes(i)) return;
    if (i === ans) {
      setRevealed(true);
      setWrongHint(false);
      if (firstTry) setScore(s=>s+1);
      happySound();
      const r = evt.currentTarget.getBoundingClientRect();
      setBursts(b=>[...b, {id:Date.now(), x:r.left+r.width/2, y:r.top+r.height/2}]);
      speak("정답이에요! 잘했어요!");
    } else {
      setWrongPicks(w => [...w, i]);
      setFirstTry(false);
      setWrongHint(true);
      sadSound();
      speak("앗, 다시 생각해 봐요. " + q.tip);
    }
  };
  const next = () => {
    setRevealed(false); setWrongPicks([]); setWrongHint(false); setFirstTry(true);
    if (idx + 1 >= pool.length) {
      addScore({correct: score, total: pool.length});
      onDone();
    } else setIdx(i=>i+1);
  };
  const askHelp = () => {
    setHelpUsed(h=> h+1); setShowHelp(true);
    speak(q.tip);
    saveToGAS("help", { name, area: q.area, q: q.q, time: new Date().toISOString() });
  };

  return (
    <div className="absolute inset-0 pt-14 px-4 pb-3"
      style={{display:'grid', gridTemplateRows:'auto auto 1fr auto auto', gap:'0.5rem'}}>
      <FloatingDeco/>
      {/* 헤더 */}
      <div className="flex items-center justify-between">
        <div className={`px-3 py-1 rounded-full font-cafe24 t-base text-white bg-gradient-to-r ${areaInfo.color} shadow flex items-center gap-1`}>
          <span>{areaInfo.emoji}</span> {areaInfo.name}
        </div>
        <div className="font-cafe24 t-md text-gray-600">{idx+1} / {pool.length} · ⭐ {score}</div>
      </div>

      {/* 큰 키워드 일러스트 + 문제 */}
      <div className="flex items-center gap-4 px-2">
        <motion.div key={"art"+idx}
          initial={{scale:0.3, rotate:-20, opacity:0}}
          animate={{scale:1, rotate:0, opacity:1}}
          transition={{type:"spring", stiffness:180, damping:14}}
          className="flex-none bg-white rounded-[28px] shadow-2xl p-3 ring-4 ring-yellow-200"
          style={{width:"clamp(80px, 22vmin, 180px)", height:"clamp(80px, 22vmin, 180px)"}}>
          {SVG[q.art]?.()}
        </motion.div>
        <motion.div key={"q"+idx}
          initial={{x:30, opacity:0}} animate={{x:0, opacity:1}}
          className="flex-1 bg-white/95 rounded-3xl shadow-xl p-4 backdrop-blur">
          <p className="font-cafe24 t-xl text-gray-800 leading-tight">
            {q.q.split("").map((ch,i)=>(
              <span key={i} className="pop-letter" style={{animationDelay:`${i*0.03}s`}}>{ch === ' ' ? '\u00A0' : ch}</span>
            ))}
          </p>
        </motion.div>
      </div>

      {/* 보기 (셔플된 순서) */}
      <div className="flex flex-col justify-center gap-3 max-w-2xl mx-auto w-full overflow-auto no-scrollbar">
        {shuffledOpts.map((opt, i)=> {
          const isWrong = wrongPicks.includes(i);
          const isAns = i === ans;
          let cls = "bg-white hover:bg-yellow-50";
          if (revealed && isAns) cls = "bg-emerald-400 text-white";
          else if (isWrong) cls = "bg-rose-300 text-white opacity-60";
          const disabled = revealed || isWrong;
          return (
            <motion.button key={i}
              initial={{x:-30, opacity:0}} animate={{x:0, opacity:1}} transition={{delay: i*0.1}}
              whileHover={{ scale: disabled?1:1.03 }} whileTap={{ scale: disabled?1:0.97 }}
              onClick={(e)=>choose(i, e)} disabled={disabled}
              className={`${cls} rounded-2xl p-3 shadow-lg flex items-center gap-3 font-cafe24 t-lg text-left card-hover ${isWrong?"shake":""}`}>
              <div className="rounded-full bg-gradient-to-br from-yellow-200 to-pink-200 flex items-center justify-center t-md flex-none"
                style={{width:"2.6rem", height:"2.6rem"}}>
                {["①","②","③"][i]}
              </div>
              <span className="flex-1">{opt}</span>
              {revealed && isAns && <Check size={28}/>}
              {isWrong && <X size={28}/>}
            </motion.button>
          );
        })}
      </div>

      {/* 피드백 영역 (틀림 힌트 / 정답 안내) */}
      <div className="flex justify-center items-center min-h-[3rem]">
        <AnimatePresence mode="wait">
          {wrongHint && !revealed && (
            <motion.div key="wrong"
              initial={{scale:0.7, opacity:0}} animate={{scale:1, opacity:1}} exit={{opacity:0}}
              className="bg-amber-100 border-4 border-amber-300 rounded-2xl px-5 py-2 font-cafe24 t-md text-amber-800 text-center max-w-2xl">
              🤔 {q.tip} <span className="text-amber-600">다른 답을 골라봐요!</span>
            </motion.div>
          )}
          {revealed && (
            <motion.div key="right"
              initial={{scale:0.7, opacity:0}} animate={{scale:1, opacity:1}} exit={{opacity:0}}
              className="bg-emerald-100 border-4 border-emerald-300 rounded-2xl px-5 py-2 font-cafe24 t-md text-emerald-700 text-center max-w-2xl">
              {firstTry ? "🎉 정답이에요! 잘했어요!" : "✅ 맞았어요! " + q.tip}
            </motion.div>
          )}
        </AnimatePresence>
      </div>

      {/* 하단 */}
      <div className="flex justify-between items-center gap-3">
        <button onClick={askHelp}
          className="px-4 py-2 rounded-2xl bg-purple-200 text-purple-700 font-cafe24 t-md shadow card-hover flex items-center gap-1">
          <HelpCircle size={20}/> 💜 도움받기
        </button>
        {revealed && (
          <motion.button initial={{scale:0}} animate={{scale:1}}
            onClick={next}
            className="px-7 py-2 rounded-2xl bg-gradient-to-r from-emerald-400 to-green-500 text-white font-cafe24 t-lg shadow-lg card-hover">
            {idx+1 >= pool.length ? "지도로 돌아가기 🗺️" : "다음 →"}
          </motion.button>
        )}
      </div>

      {bursts.map(b=> <Burst key={b.id} x={b.x} y={b.y} onDone={()=>setBursts(bs=>bs.filter(x=>x.id!==b.id))}/>)}
      <AnimatePresence>
        {showHelp && (
          <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}
            className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-6"
            onClick={()=>setShowHelp(false)}>
            <motion.div initial={{scale:0.5}} animate={{scale:1}}
              className="bg-white rounded-3xl p-6 max-w-md shadow-2xl text-center">
              <div className="t-huge mb-2 bounce-soft">💜</div>
              <p className="font-cafe24 t-lg text-gray-800 mb-3">{q.tip}</p>
              <button onClick={()=>setShowHelp(false)}
                className="px-6 py-2 bg-purple-400 text-white rounded-2xl font-cafe24 t-md">알겠어요!</button>
            </motion.div>
          </motion.div>
        )}
      </AnimatePresence>
    </div>
  );
}

/* =========================================================
   수료증
========================================================= */
function Certificate({ name, score, total, stars, sticker, helpUsed, onHome }) {
  useEffect(()=>{
    speak(`${name} 친구, 안전탐험을 모두 마쳤어요! 정말 멋져요!`);
    happySound(); setTimeout(happySound, 400); setTimeout(happySound, 900);
  },[]);
  const today = new Date();
  const dateStr = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;
  return (
    <div className="absolute inset-0 pt-14 px-4 pb-3"
      style={{display:'grid', gridTemplateRows:'1fr auto', gap:'0.6rem'}}>
      <FloatingDeco/>
      <motion.div initial={{scale:0.7, opacity:0, y:30}} animate={{scale:1, opacity:1, y:0}}
        transition={{type:"spring", stiffness:120}}
        className="w-full max-w-3xl mx-auto bg-white rounded-[40px] shadow-2xl p-6 border-8 border-double border-yellow-300 relative flex flex-col justify-center min-h-0">
        <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-gradient-to-r from-yellow-300 to-pink-300 rounded-full px-5 py-1 shadow-lg">
          <span className="font-cafe24 t-md">🏆 안전탐험 수료증 🏆</span>
        </div>
        <div className="text-center">
          <div className="t-huge mb-2 bounce-soft" style={{lineHeight:1}}>{sticker || "🎉"}</div>
          <p className="font-cafe24 t-2xl mb-1">
            <span className="hi-yellow">{name}</span> 친구
          </p>
          <p className="font-cafe24 t-base text-gray-600 mb-2">위 어린이는</p>
          <div className="inline-block px-4 py-1 rounded-full text-white font-cafe24 t-md bg-gradient-to-r from-pink-400 via-purple-400 to-blue-400 mb-3 shadow">
            🛡️ 안전탐험 모든 영역
          </div>
          <p className="font-cafe24 t-lg text-gray-700 mb-3">을 끝까지 잘 마쳤음을 칭찬합니다!</p>
          <div className="grid grid-cols-3 gap-2 max-w-md mx-auto mb-3">
            <div className="bg-rose-50 rounded-2xl p-2">
              <div className="t-xl mb-1">📝</div>
              <div className="font-cafe24 t-xs text-gray-500">맞춘 문제</div>
              <div className="font-cafe24 t-md text-rose-500">{score}/{total}</div>
            </div>
            <div className="bg-yellow-50 rounded-2xl p-2">
              <div className="t-xl mb-1">⭐</div>
              <div className="font-cafe24 t-xs text-gray-500">자기 별점</div>
              <div className="font-cafe24 t-md text-amber-500">{stars}/5</div>
            </div>
            <div className="bg-purple-50 rounded-2xl p-2">
              <div className="t-xl mb-1">💜</div>
              <div className="font-cafe24 t-xs text-gray-500">도움 횟수</div>
              <div className="font-cafe24 t-md text-purple-500">{helpUsed}</div>
            </div>
          </div>
          <p className="font-cafe24 t-sm text-gray-500">{dateStr}</p>
          <p className="font-cafe24 t-sm text-gray-500">안전탐험 🛡️</p>
        </div>
      </motion.div>
      <div className="text-center">
        <button onClick={onHome}
          className="px-6 py-2 rounded-2xl bg-gradient-to-r from-pink-400 to-rose-500 text-white font-cafe24 t-md shadow-lg card-hover">
          🏠 처음으로
        </button>
      </div>
    </div>
  );
}

/* =========================================================
   메인 App
========================================================= */
function App() {
  const [step, setStep] = useState("start");
  const [name, setName] = useState("");
  const [currentArea, setCurrentArea] = useState("");
  const [cleared, setCleared] = useState({});
  const [speakerOn, setSpeakerOn] = useState(false);
  const [showTutorial, setShowTutorial] = useState(false);
  const [helpUsed, setHelpUsed] = useState(0);
  const [scoreSum, setScoreSum] = useState({correct:0, total:0});
  const [preResult, setPreResult] = useState(null);
  const [postResult, setPostResult] = useState(null);

  useEffect(()=>{ setSPK(speakerOn); }, [speakerOn]);
  useEffect(()=>{
    const asked = localStorage.getItem("mic_asked");
    if (!asked && navigator.mediaDevices) {
      navigator.mediaDevices.getUserMedia({audio:true})
        .then(s=> { s.getTracks().forEach(t=>t.stop()); localStorage.setItem("mic_asked","1"); })
        .catch(()=> localStorage.setItem("mic_asked","1"));
    }
    window.speechSynthesis?.getVoices();
  },[]);

  const reset = () => {
    setStep("start"); setName(""); setCurrentArea("");
    setCleared({}); setHelpUsed(0); setScoreSum({correct:0,total:0});
    setPreResult(null); setPostResult(null);
  };
  const addScore = (r) => {
    if (cleared[currentArea]) return; // 복습 모드: 이미 클리어한 영역은 점수 미반영
    setScoreSum(prev => ({ correct: prev.correct + r.correct, total: prev.total + r.total }));
  };

  const progress =
    step === "start" ? 0 :
    step === "pre" ? 0.1 :
    step === "map" ? 0.2 + 0.5 * (Object.keys(cleared).length / AREAS.length) :
    (step === "concept" || step === "quiz") ? 0.2 + 0.5 * (Object.keys(cleared).length / AREAS.length) + 0.05 :
    step === "post" ? 0.9 :
    step === "cert" ? 1 : 0;

  return (
    <div className="relative w-full h-full">
      {step !== "start" && (
        <TopBar name={name} speakerOn={speakerOn} setSpeakerOn={setSpeakerOn} onHome={reset} progress={progress}/>
      )}
      <AnimatePresence mode="wait">
        {step === "start" && (
          <motion.div key="start" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="absolute inset-0">
            <StartScreen onStart={(n)=>{ setName(n); setStep("pre"); }} onShowTutorial={()=>setShowTutorial(true)}/>
          </motion.div>
        )}
        {step === "pre" && (
          <motion.div key="pre" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="absolute inset-0">
            <RecordBlock
              prompt="오늘 알고 있는 안전 규칙을 말해 봐요"
              helpText="말하기, 글쓰기, 건너뛰기 모두 괜찮아요!"
              canSkip={true}
              onSubmit={(r)=>{ setPreResult(r); saveToGAS("pre_record", { name, text:r.text, skipped:!!r.skipped, time: new Date().toISOString() }); setStep("map"); }}/>
          </motion.div>
        )}
        {step === "map" && (
          <motion.div key="map" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="absolute inset-0">
            <MapScreen name={name} cleared={cleared}
              onPickArea={(a)=>{ setCurrentArea(a); setStep("concept"); }}
              onAllClear={()=> setStep("post")}/>
          </motion.div>
        )}
        {step === "concept" && (
          <motion.div key="concept" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="absolute inset-0">
            <ConceptLearn area={currentArea} onDone={()=> setStep("quiz")}/>
          </motion.div>
        )}
        {step === "quiz" && (
          <motion.div key="quiz" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="absolute inset-0">
            <Quiz area={currentArea} name={name}
              helpUsed={helpUsed} setHelpUsed={setHelpUsed}
              addScore={addScore}
              onDone={()=>{ setCleared(c=>({...c, [currentArea]: true})); setStep("map"); }}/>
          </motion.div>
        )}
        {step === "post" && (
          <motion.div key="post" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="absolute inset-0">
            <RecordBlock
              prompt="오늘 배운 것 한 가지와 다짐을 말해요"
              helpText="가장 기억에 남는 안전 규칙을 자랑해 봐요!"
              askStars={true}
              onSubmit={(r)=>{
                setPostResult(r);
                saveToGAS("post_record", { name, text:r.text, stars:r.stars, sticker:r.sticker, score: scoreSum.correct, total: scoreSum.total, helpUsed, time: new Date().toISOString() });
                setStep("cert");
              }}/>
          </motion.div>
        )}
        {step === "cert" && (
          <motion.div key="cert" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="absolute inset-0">
            <Certificate name={name}
              score={scoreSum.correct} total={scoreSum.total}
              stars={postResult?.stars || 0} sticker={postResult?.sticker}
              helpUsed={helpUsed} onHome={reset}/>
          </motion.div>
        )}
      </AnimatePresence>
      <AnimatePresence>
        {showTutorial && <Tutorial onClose={()=>setShowTutorial(false)}/>}
      </AnimatePresence>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
